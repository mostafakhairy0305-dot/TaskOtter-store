  zizmor: taskfiles/zizmor/Taskfile.yml

tasks:
  default:
    run: once
    desc: Show all available TaskOtter tasks
    cmds:
      - task --list-all

  lint:
    run: once
    desc: Run YAML and GitHub Actions lint checks
    deps:
      - yamllint:lint
      - zizmor:lint
      - actionlint:lint

  lint:fix:
    run: once
    desc: Auto-fix YAML lint issues
    deps:
      - yamllint:lint:fix

  fmt:
    run: once
    desc: Auto-format YAML files
    deps:
      - yamllint:lint:fix

  fmt:check:
    run: once
    desc: Check YAML formatting and style
    deps:
      - yamllint:lint

  ci:
    run: once
    desc: Run CI flow
    deps:
      - fmt:check
      - lint
