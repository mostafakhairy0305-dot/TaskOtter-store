---
name: CI
description: Set up Go and Task, vet, and test the project.
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
    - name: Install Taskfile CLI
      uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      with:
        version: 3.x
    - name: Show versions
      shell: bash
      run: |
        go version
        task --version
    - name: Run CI
      shell: bash
      run: task -t Taskfile.yml ci
    - name: Vet
      shell: bash
      run: go vet ./...
    - name: Test
      shell: bash
      run: go test ./... -count=1 -timeout 5m
