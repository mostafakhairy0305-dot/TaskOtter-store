    internal: true
    desc: Verify gh installation and auth status on Windows
    summary: |
      Confirm gh is installed and gh --version works on Windows, then report
      the current authentication status.
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "Write-Host '=== gh binary ==='; (Get-Command gh).Source;
        Write-Host ''; Write-Host '=== gh version ==='; gh --version;
        Write-Host ''; Write-Host '=== gh auth status ===';
        try { gh auth status }
        catch { Write-Host 'Not authenticated. Run: task auth:login' }"

  _secret:set:unix:
    internal: true
    desc: Set a GitHub Actions secret on macOS or Linux via stdin
    summary: |
      Pipe the secret value via stdin to avoid exposure in the process list.
      Reads SECRET_VALUE from the task environment.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    env:
      GH_SECRET_VALUE: "{{.SECRET_VALUE}}"
    cmds:
      - >-
        printf '%s' "$GH_SECRET_VALUE"
        | gh secret set {{.SECRET_NAME}} --body -
        {{if .ENVIRONMENT}}--env {{.ENVIRONMENT}}{{end}}

  _secret:set:windows:
    internal: true
    desc: Set a GitHub Actions secret on Windows via stdin
    summary: |
      Pipe the secret value via PowerShell stdin to avoid exposure in the
      process list. Reads SECRET_VALUE from the task environment.
    platforms: [windows]
    env:
      GH_SECRET_VALUE: "{{.SECRET_VALUE}}"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$env:GH_SECRET_VALUE | gh secret set {{.SECRET_NAME}} --body -
        {{if .ENVIRONMENT}}--env {{.ENVIRONMENT}}{{end}}"
