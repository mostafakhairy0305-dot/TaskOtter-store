  _repo:clone:unix:
    internal: true
    desc: Clone a repository on macOS or Linux
    summary: |
      When PAT_TOKEN is set, embeds the token in the HTTPS URL for reliable
      authentication against private repos not owned by the caller.
      Falls back to gh repo clone when PAT_TOKEN is absent.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    env:
      GH_PAT: "{{.PAT_TOKEN}}"
    cmds:
      - |
        TARGET="{{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}}"
        DEST="{{if ne .CLONE_DIR "."}}{{.CLONE_DIR}}{{end}}"
        if [ -n "$GH_PAT" ]; then
          git clone "https://${GH_PAT}@github.com/${TARGET}.git"${DEST:+ "$DEST"}
        else
          gh repo clone "$TARGET"${DEST:+ "$DEST"}
        fi

  _repo:clone:windows:
    internal: true
    desc: Clone a repository on Windows
    summary: |
      When PAT_TOKEN is set, embeds the token in the HTTPS URL for reliable
      authentication against private repos not owned by the caller.
      Falls back to gh repo clone when PAT_TOKEN is absent.
    platforms: [windows]
    env:
      GH_PAT: "{{.PAT_TOKEN}}"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$target = '{{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}}';
        $dest = '{{if ne .CLONE_DIR "."}}{{.CLONE_DIR}}{{end}}';
        $args = @($dest) | Where-Object { $_ };
        if ($env:GH_PAT) { git clone \"https://$env:GH_PAT@github.com/$target.git\" @args }
        else { gh repo clone $target @args }"

  _api:post:unix:
    internal: true
    desc: POST to the GitHub API on macOS or Linux by piping DATA via stdin
    summary: Pipe DATA to gh api --method POST via printf on macOS or Linux.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    env:
      GH_DATA: "{{.DATA}}"
    cmds:
      - printf '%s' "$GH_DATA" | gh api --method POST {{.ENDPOINT}} --input -

  _api:post:windows:
    internal: true
    desc: POST to the GitHub API on Windows by piping DATA via stdin
    summary: Pipe DATA to gh api --method POST via PowerShell on Windows.
    platforms: [windows]
    env:
      GH_DATA: "{{.DATA}}"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$env:GH_DATA | gh api --method POST {{.ENDPOINT}} --input -"

  _api:patch:unix:
    internal: true
    desc: PATCH the GitHub API on macOS or Linux by piping DATA via stdin
    summary: Pipe DATA to gh api --method PATCH via printf on macOS or Linux.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    env:
      GH_DATA: "{{.DATA}}"
    cmds:
      - printf '%s' "$GH_DATA" | gh api --method PATCH {{.ENDPOINT}} --input -

  _api:patch:windows:
    internal: true
    desc: PATCH the GitHub API on Windows by piping DATA via stdin
    summary: Pipe DATA to gh api --method PATCH via PowerShell on Windows.
    platforms: [windows]
    env:
      GH_DATA: "{{.DATA}}"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$env:GH_DATA | gh api --method PATCH {{.ENDPOINT}} --input -"

  _alias:set:unix:
    internal: true
    desc: Set a gh alias on macOS or Linux using single-quoted expansion
    summary: Run gh alias set with single-quote wrapping on macOS or Linux.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    cmds:
      - gh alias set {{.ALIAS_NAME}} '{{.ALIAS_COMMAND}}'

  _alias:set:windows:
    internal: true
    desc: Set a gh alias on Windows using double-quoted expansion
    summary: Run gh alias set with double-quote wrapping on Windows.
    platforms: [windows]
    cmds:
      - gh alias set {{.ALIAS_NAME}} "{{.ALIAS_COMMAND}}"

  _workflow:watch:unix:
    internal: true
    desc: Watch the latest run of a workflow on macOS or Linux
    summary: Resolve the most recent run ID via command substitution, then watch it.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    cmds:
      - gh run watch $(gh run list --workflow {{.WORKFLOW}} --limit 1 --json databaseId --jq '.[0].databaseId')

  _workflow:watch:windows:
    internal: true
    desc: Watch the latest run of a workflow on Windows
    summary: Resolve the most recent run ID via PowerShell, then watch it.
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$runId = (gh run list --workflow {{.WORKFLOW}} --limit 1 --json databaseId
        | ConvertFrom-Json)[0].databaseId;
        gh run watch $runId"

  _install:auto:unix:
    internal: true
    desc: Auto-detect package manager and install gh on macOS or Linux
    summary: |
      Check whether gh is already installed. If not, detect the OS and
      available package managers, then install gh using the best method.
      On macOS prefers Homebrew. On Linux checks apt, dnf, yum, pacman,
      zypper, snap, brew in order and uses the first one found.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '[ -z "{{.VERSION}}" ]'
      - command -v gh >/dev/null 2>&1
    cmds:
      - |
        VERSION="{{.VERSION}}"
        OS="$(uname -s)"
        if [ "$OS" = "Darwin" ]; then
          if command -v brew >/dev/null 2>&1; then
            echo 'macOS detected. Installing gh via Homebrew...'
            brew install "gh${VERSION:+@$VERSION}"
          else
            echo 'ERROR: Homebrew is required to install gh on macOS.'
            echo 'Install Homebrew from https://brew.sh and then re-run: task install'
            exit 1
          fi
        elif [ "$OS" = "Linux" ]; then
          if command -v apt-get >/dev/null 2>&1; then
            echo 'Debian/Ubuntu detected. Installing gh via apt...'
            sudo apt-get update
            sudo apt-get install -y wget
            sudo mkdir -p -m 755 /etc/apt/keyrings
            wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            _key="signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg"
            echo "deb [arch=$(dpkg --print-architecture) $_key] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y "gh${VERSION:+=$VERSION}"
          elif command -v dnf >/dev/null 2>&1; then
            echo 'Fedora/RHEL detected. Installing gh via dnf...'
            sudo dnf install -y 'dnf-command(config-manager)'
            sudo dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
            sudo dnf install -y "gh${VERSION:+-$VERSION}" --repo gh-cli
          elif command -v yum >/dev/null 2>&1; then
            echo 'CentOS/RHEL detected. Installing gh via yum...'
            sudo yum-config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
            sudo yum install -y "gh${VERSION:+-$VERSION}"
          elif command -v pacman >/dev/null 2>&1; then
            echo 'Arch Linux detected. Installing gh via pacman...'
            sudo pacman -S --noconfirm github-cli
          elif command -v zypper >/dev/null 2>&1; then
            echo 'openSUSE detected. Installing gh via zypper...'
            sudo zypper addrepo https://cli.github.com/packages/rpm/gh-cli.repo
            sudo zypper ref
            sudo zypper install -y "gh${VERSION:+-$VERSION}"
          elif command -v snap >/dev/null 2>&1; then
            echo 'snap detected. Installing gh via snap...'
            sudo snap install gh
          elif command -v brew >/dev/null 2>&1; then
            echo 'Homebrew detected. Installing gh via brew...'
            brew install "gh${VERSION:+@$VERSION}"
          else
            echo 'ERROR: No supported package manager detected.'
            echo 'See https://cli.github.com/manual/installation'
            exit 1
          fi
        else
          echo "ERROR: Unsupported OS: $OS"
          echo 'See https://cli.github.com/manual/installation'
          exit 1
        fi

  _install:auto:windows:
    internal: true
    desc: Auto-detect package manager and install gh on Windows
    summary: |
      Check whether gh is already installed on Windows. If not, detect
      available package managers (winget, choco, scoop) and install gh
      using the first one found. Prefers winget, then Chocolatey, then Scoop.
    platforms: [windows]
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if ('{{.VERSION}}') { exit 1 } else { exit 0 }"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command gh -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$v = '{{.VERSION}}';
        if (Get-Command winget -ErrorAction SilentlyContinue) {
        Write-Host 'winget detected. Installing gh via winget...';
        winget install --id GitHub.cli $(if ($v) { '--version', $v })
        --accept-source-agreements --accept-package-agreements }
        elseif (Get-Command choco -ErrorAction SilentlyContinue) {
        Write-Host 'Chocolatey detected. Installing gh via choco...';
        choco install gh -y $(if ($v) { '--version', $v }) }
        elseif (Get-Command scoop -ErrorAction SilentlyContinue) {
        Write-Host 'Scoop detected. Installing gh via scoop...';
        scoop install $(if ($v) { \"gh@$v\" } else { 'gh' }) }
        else { $err = 'ERROR: No supported package manager detected (winget, choco, scoop).' +
        ' See https://cli.github.com/manual/installation'; Write-Error $err; exit 1 }"

  _install:macos:brew:
    internal: true
    desc: Install gh on macOS using Homebrew
    summary: Run `brew install gh` on macOS. Skipped if gh is already installed.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - command -v gh >/dev/null 2>&1
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: "Homebrew is required. Install it from https://brew.sh"
    cmds:
      - echo 'Installing gh via Homebrew...'
      - brew install gh
      - echo 'gh installed successfully.'

  _install:windows:winget:
    internal: true
    desc: Install gh on Windows using winget
    summary: Run `winget install --id GitHub.cli` on Windows. Skipped if gh is already installed.
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command gh -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command winget -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: "winget is required. Update Windows or install App Installer from the Microsoft Store."
    cmds:
      - echo Installing gh via winget...
      - winget install --id GitHub.cli --accept-source-agreements --accept-package-agreements
      - echo gh installed successfully. Restart your terminal if gh is not in PATH.

  _install:windows:choco:
    internal: true
    desc: Install gh on Windows using Chocolatey
    summary: Run `choco install gh` on Windows. Skipped if gh is already installed.
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command gh -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command choco -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: "Chocolatey is required. Install it from https://chocolatey.org"
    cmds:
      - echo Installing gh via Chocolatey...
      - choco install gh -y
      - echo gh installed successfully.

  _install:windows:scoop:
    internal: true
    desc: Install gh on Windows using Scoop
    summary: Run `scoop install gh` on Windows. Skipped if gh is already installed.
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command gh -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command scoop -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: "Scoop is required. Install it from https://scoop.sh"
    cmds:
      - echo Installing gh via Scoop...
      - scoop install gh
      - echo gh installed successfully.

  _install:linux:apt:
    internal: true
    desc: Install gh on Debian or Ubuntu using apt
    summary: |
      Add the official GitHub apt repository and GPG key, then install gh.
      Skipped if gh is already installed. Requires sudo.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - command -v gh >/dev/null 2>&1
    preconditions:
      - sh: command -v apt-get >/dev/null 2>&1
        msg: "apt-get is required. This task supports Debian/Ubuntu-based systems only."
    cmds:
      - echo 'Installing gh via apt...'
      - sudo apt-get update
      - sudo apt-get install -y wget
      - sudo mkdir -p -m 755 /etc/apt/keyrings
      - >-
        wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg
        | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
      - sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
      - >-
        _key="signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg";
        echo "deb [arch=$(dpkg --print-architecture) $_key] https://cli.github.com/packages stable main"
        | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
      - sudo apt-get update
      - sudo apt-get install -y gh
      - echo 'gh installed successfully.'

  _install:linux:dnf:
    internal: true
    desc: Install gh on Fedora or RHEL using dnf
    summary: |
      Add the official GitHub rpm repository and install gh via dnf.
      Skipped if gh is already installed. Requires sudo.
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - command -v gh >/dev/null 2>&1
    preconditions:
      - sh: command -v dnf >/dev/null 2>&1
        msg: "dnf is required. This task supports Fedora/RHEL-based systems only."
    cmds:
      - echo 'Installing gh via dnf...'
      - sudo dnf install -y 'dnf-command(config-manager)'
      - sudo dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
      - sudo dnf install -y gh --repo gh-cli
      - echo 'gh installed successfully.'

