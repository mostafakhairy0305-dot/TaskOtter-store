  ssh-key:list:
    desc: List SSH keys associated with the GitHub account
    summary: List all SSH keys for the authenticated GitHub user via `gh ssh-key list`.
    deps:
      - install
    cmds:
      - gh ssh-key list

  ssh-key:add:
    desc: Add an SSH public key to the GitHub account
    summary: |
      Add the SSH public key at SSH_KEY_FILE to the authenticated GitHub account.
      Set SSH_KEY_TITLE for an optional display name.
      Requires SSH_KEY_FILE. Example: SSH_KEY_FILE=~/.ssh/id_ed25519.pub SSH_KEY_TITLE="laptop"
    requires:
      vars:
        - SSH_KEY_FILE
    deps:
      - install
    cmds:
      - gh ssh-key add {{.SSH_KEY_FILE}} {{if .SSH_KEY_TITLE}}--title "{{.SSH_KEY_TITLE}}"{{end}}

  ssh-key:delete:danger:
    desc: Permanently delete an SSH key from the GitHub account
    summary: |
      Delete the SSH key identified by SSH_KEY_ID from the authenticated
