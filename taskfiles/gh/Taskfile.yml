    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    cmds:
      - |
        echo '=== gh binary ==='
        command -v gh
        echo ''
        echo '=== gh version ==='
        gh --version
        echo ''
        echo '=== gh auth status ==='
        gh auth status || echo 'Not authenticated. Run: task auth:login'

