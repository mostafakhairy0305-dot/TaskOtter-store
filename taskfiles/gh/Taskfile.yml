  _uninstall:auto:unix:
    internal: true
    desc: Auto-detect package manager and uninstall gh on macOS or Linux
    summary: |
      Detect the OS and available package managers, then remove gh using the
      matching uninstall command. On macOS uses Homebrew. On Linux checks
      apt, dnf, yum, pacman, zypper, snap, and brew in order.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v gh >/dev/null 2>&1"
    cmds:
      - |
        OS="$(uname -s)"
        if [ "$OS" = "Darwin" ]; then
          if command -v brew >/dev/null 2>&1; then
            echo 'Removing gh via Homebrew...'
            brew uninstall gh
          else
            echo 'ERROR: Homebrew is required to remove gh on macOS.'
            exit 1
          fi
        elif [ "$OS" = "Linux" ]; then
          if command -v apt-get >/dev/null 2>&1; then
            echo 'Removing gh via apt...'
            sudo apt-get remove -y gh
          elif command -v dnf >/dev/null 2>&1; then
            echo 'Removing gh via dnf...'
            sudo dnf remove -y gh
          elif command -v yum >/dev/null 2>&1; then
            echo 'Removing gh via yum...'
            sudo yum remove -y gh
          elif command -v pacman >/dev/null 2>&1; then
            echo 'Removing gh via pacman...'
            sudo pacman -R --noconfirm github-cli
          elif command -v zypper >/dev/null 2>&1; then
            echo 'Removing gh via zypper...'
            sudo zypper remove -y gh
          elif command -v snap >/dev/null 2>&1; then
            echo 'Removing gh via snap...'
            sudo snap remove gh
          elif command -v brew >/dev/null 2>&1; then
            echo 'Removing gh via Homebrew...'
            brew uninstall gh
          else
            echo 'ERROR: No supported package manager detected.'
            exit 1
          fi
        else
          echo "ERROR: Unsupported OS: $OS"
          exit 1
        fi
        echo 'gh removed.'

  _uninstall:auto:windows:
    internal: true
    desc: Auto-detect package manager and uninstall gh on Windows
    summary: |
      Detect available package managers on Windows and remove gh using the
      matching uninstall command. Prefers winget, then Chocolatey, then Scoop.
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command gh -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command winget -ErrorAction SilentlyContinue) {
        Write-Host 'winget detected. Removing gh via winget...';
        winget uninstall --id GitHub.cli }
        elseif (Get-Command choco -ErrorAction SilentlyContinue) {
        Write-Host 'Chocolatey detected. Removing gh via choco...'; choco uninstall gh -y }
        elseif (Get-Command scoop -ErrorAction SilentlyContinue) {
        Write-Host 'Scoop detected. Removing gh via scoop...'; scoop uninstall gh }
        else { Write-Error 'ERROR: No supported package manager detected (winget, choco, scoop).'; exit 1 }"

  _uninstall:macos:brew:
    internal: true
    desc: Uninstall gh on macOS using Homebrew
    summary: Run `brew uninstall gh` on macOS.
    platforms: [darwin]
