  search:repos:
    desc: Search for GitHub repositories
    summary: |
      Search GitHub repositories using the query in QUERY.
      Requires QUERY. Example: QUERY="cli tool language:go"
    requires:
      vars:
        - QUERY
    deps:
      - install
