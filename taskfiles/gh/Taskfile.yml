      Requires ENDPOINT. Example: ENDPOINT=/repos/github/cli/releases/latest
    requires:
      vars:
        - ENDPOINT
    deps:
      - install
    cmds:
      - gh api {{.ENDPOINT}}

  api:post:
    desc: Make an authenticated POST request to the GitHub API
    summary: |
      Make a POST request to the GitHub REST API ENDPOINT with DATA as the
      request body. Requires ENDPOINT.
      Example: ENDPOINT=/repos/github/cli/issues DATA='{"title":"Bug"}'
    requires:
      vars:
        - ENDPOINT
    deps:
      - install
    cmds:
      - task: _api:post:unix
      - task: _api:post:windows

  api:patch:
    desc: Make an authenticated PATCH request to the GitHub API
    summary: |
      Make a PATCH request to the GitHub REST API ENDPOINT with DATA as the
      request body. Requires ENDPOINT.
      Example: ENDPOINT=/repos/github/cli/issues/1 DATA='{"state":"closed"}'
    requires:
      vars:
        - ENDPOINT
    deps:
      - install
    cmds:
      - task: _api:patch:unix
      - task: _api:patch:windows

  api:delete:danger:
    desc: Make an authenticated DELETE request to the GitHub API
    summary: |
      Make a DELETE request to the GitHub REST API ENDPOINT. This is a
      destructive operation and requires explicit confirmation.
      Requires ENDPOINT. Example: ENDPOINT=/repos/github/cli/releases/1
    requires:
      vars:
        - ENDPOINT
    prompt:
      - "This will send a DELETE request to the GitHub API: {{.ENDPOINT}}"
      - This may permanently remove resources. Are you sure you want to continue?
    deps:
      - install
    cmds:
      - gh api --method DELETE {{.ENDPOINT}}

  extension:list:
