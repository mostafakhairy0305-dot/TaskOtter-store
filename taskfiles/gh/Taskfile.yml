  alias:set:
    desc: Create or update a GitHub CLI command alias
    summary: |
      Create a gh command alias named ALIAS_NAME that expands to ALIAS_COMMAND.
      Requires ALIAS_NAME and ALIAS_COMMAND.
      Example: ALIAS_NAME=prc ALIAS_COMMAND="pr create --fill"
    requires:
      vars:
        - ALIAS_NAME
        - ALIAS_COMMAND
    deps:
      - install
    cmds:
      - task: _alias:set:unix
      - task: _alias:set:windows

  alias:delete:
    desc: Delete a GitHub CLI command alias
    summary: |
      Remove the gh command alias named ALIAS_NAME.
      Requires ALIAS_NAME. Example: ALIAS_NAME=prc
    requires:
      vars:
        - ALIAS_NAME
    deps:
      - install
    cmds:
      - gh alias delete {{.ALIAS_NAME}}

  project:list:
    desc: List GitHub Projects for a user or organisation
    summary: |
