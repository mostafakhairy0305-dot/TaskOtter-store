---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  jq: ../jq/Taskfile.yml

vars:
  VISIBILITY: "public"
  BASE: "main"
  MERGE_METHOD: "merge"
  CLONE_DIR: "."
  DOWNLOAD_DIR: "."
  DATA: "{}"
  PAT_TOKEN: ""
  VERSION: ""

env:
  GH_TOKEN: "{{.PAT_TOKEN}}"

tasks:
  default:
    desc: Show available GitHub CLI automation tasks
    summary: Display the list of available gh-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    run: once
    desc: Install the GitHub CLI on the current operating system
    summary: |
      Detect the current OS and available package managers, then install gh
      using the best available method.
      Pass VERSION=x.y.z to pin a specific release; exact availability
      depends on what the detected package manager/repository carries.
      On macOS, prefers Homebrew.
      On Windows, prefers winget, then Chocolatey, then Scoop.
      On Linux, detects apt, dnf, yum, pacman, zypper, snap, or brew.
    cmds:
      - task: _install:auto:unix
      - task: _install:auto:windows

  install:undo:
    desc: Remove the GitHub CLI from the current operating system
    summary: |
      Detect the current OS and available package managers, then remove gh
      using the matching uninstall method.
      On macOS uses Homebrew. On Windows tries winget, then Chocolatey, then
      Scoop. On Linux detects apt, dnf, yum, pacman, zypper, snap, or brew.
    aliases:
      - uninstall
    prompt:
      - This will remove the GitHub CLI from this machine.
      - Continue?
    cmds:
      - task: _uninstall:auto:unix
      - task: _uninstall:auto:windows

  upgrade:
    desc: Upgrade the GitHub CLI to the latest version on the current OS
    summary: |
      Auto-detect the OS and package manager used to install gh, then upgrade
      to the latest release. On macOS uses brew upgrade. On Windows uses winget
      upgrade. On Linux uses the detected package manager.
    deps:
      - install
    cmds:
      - task: _upgrade:auto:unix
      - task: _upgrade:auto:windows

  version:
    desc: Show the installed GitHub CLI version
    summary: Print the installed gh version string via `gh --version`.
    deps:
      - install
    cmds:
      - task: _version:unix
      - task: _version:windows

  doctor:
    desc: Run the GitHub CLI self-diagnostic check
    summary: |
      Run `gh doctor` to check your gh configuration, authentication,
      and network connectivity to GitHub.
    deps:
      - install
    cmds:
      - task: _doctor:unix
      - task: _doctor:windows

  which:
    desc: Show the path to the GitHub CLI binary
    summary: Print the filesystem path of the gh binary resolved from PATH.
    deps:
      - install
    cmds:
      - task: _which:unix
      - task: _which:windows

  verify:
    desc: Verify the GitHub CLI installation and authentication status
    summary: |
      Check that gh is installed, confirm `gh --version` runs cleanly,
      and report the current authentication status via `gh auth status`.
      Prints a clear message if the user is not yet authenticated.
    deps:
      - install
    cmds:
      - task: _verify:unix
      - task: _verify:windows

  help:
    desc: Show the GitHub CLI built-in help
    summary: Display the built-in gh help output via `gh help`.
    deps:
      - install
    cmds:
      - gh help

  auth:login:
    desc: Authenticate with GitHub interactively
    summary: |
      Start an interactive GitHub authentication flow via `gh auth login`.
      Prompts for hostname, protocol, and authentication method.
      This task is interactive and requires a terminal.
    deps:
      - install
    cmds:
      - gh auth login

  auth:login:web:
    desc: Authenticate with GitHub using the web browser
    summary: |
      Authenticate with GitHub by opening a browser window for OAuth.
      Uses `gh auth login --web`. This task is interactive.
    deps:
      - install
    cmds:
      - gh auth login --web

  auth:login:ssh:
    desc: Authenticate with GitHub using SSH protocol
    summary: |
      Authenticate with GitHub using the SSH git protocol.
      Uses `gh auth login --git-protocol ssh`. This task is interactive.
    deps:
      - install
    cmds:
      - gh auth login --git-protocol ssh

  auth:status:
    desc: Show the current GitHub authentication status
    summary: |
      Display the current GitHub authentication status for all configured
      hosts via `gh auth status`.
    deps:
      - install
    cmds:
      - gh auth status

  auth:refresh:
    desc: Refresh the GitHub CLI authentication token
    summary: |
      Refresh the stored GitHub CLI credentials to extend their validity
      via `gh auth refresh`. This task is interactive.
    deps:
      - install
    cmds:
      - gh auth refresh

  auth:logout:
    desc: Log out from GitHub and remove stored credentials
    summary: |
      Remove locally stored GitHub credentials via `gh auth logout`.
      You will need to re-authenticate with `task auth:login` afterwards.
    deps:
      - install
    cmds:
      - gh auth logout

  auth:setup-git:
    desc: Configure git to use the GitHub CLI as a credential helper
    summary: |
      Configure git to delegate GitHub authentication to gh via
      `gh auth setup-git`. This enables seamless HTTPS git operations.
    deps:
      - install
    cmds:
      - gh auth setup-git

  repo:view:
    desc: View a GitHub repository in the terminal or browser
    summary: |
      View repository details in the terminal. If REPO is set, views that
      specific repository (with optional OWNER prefix). Otherwise views the
      repository in the current working directory.
      Example: OWNER=github REPO=cli
    deps:
      - install
    cmds:
      - gh repo view {{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}}

  repo:create:
    desc: Create a new GitHub repository
    summary: |
      Create a new GitHub repository. Requires REPO to be set.
      VISIBILITY defaults to "public". Set DESCRIPTION for an optional description.
      Example: REPO=my-project VISIBILITY=private DESCRIPTION="My project"
    requires:
      vars:
        - REPO
    deps:
      - install
    cmds:
      - >-
        gh repo create
        {{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}}
        --{{default "public" .VISIBILITY}}
        {{if .DESCRIPTION}}--description "{{.DESCRIPTION}}"{{end}}

  repo:clone:
    desc: Clone a GitHub repository to the local machine
    summary: |
      Clone a GitHub repository. Requires REPO to be set.
      Set OWNER to clone from a specific user or organisation.
      Set CLONE_DIR to specify the destination directory (defaults to ".").
      Set PAT_TOKEN to access private repositories not owned by you — the
      token is embedded directly in the HTTPS clone URL for reliable CI auth.
      Requires OWNER when PAT_TOKEN is set.
      Example: OWNER=github REPO=cli CLONE_DIR=~/src/gh
      Private: OWNER=myorg REPO=private-repo PAT_TOKEN=ghp_xxx
    requires:
      vars:
        - REPO
    deps:
      - install
    cmds:
      - task: _repo:clone:unix
      - task: _repo:clone:windows

  repo:fork:
    desc: Fork a GitHub repository to your account
    summary: |
      Fork a GitHub repository. If REPO is set, forks that specific repo;
      otherwise forks the repository in the current working directory.
      Set PAT_TOKEN to fork private repositories not owned by you.
      Example: OWNER=github REPO=cli
      Private: OWNER=myorg REPO=private-repo PAT_TOKEN=ghp_xxx
    deps:
      - install
    cmds:
      - gh repo fork {{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}} --clone

  repo:list:
    desc: List GitHub repositories for the authenticated user or an owner
    summary: |
      List repositories for the authenticated user. Set OWNER to list
      repositories for a specific user or organisation instead.
      Example: OWNER=github
    deps:
      - install
    cmds:
      - gh repo list {{.OWNER}}

  repo:sync:
    desc: Sync the current repository branch with the upstream source
    summary: |
      Sync the current branch with its upstream source via `gh repo sync`.
      Optionally set BRANCH to sync a specific branch.
      Example: BRANCH=main
    deps:
      - install
    cmds:
      - gh repo sync {{if .BRANCH}}--branch {{.BRANCH}}{{end}}

  repo:archive:
    desc: Archive a GitHub repository
    summary: |
      Archive a GitHub repository, making it read-only. Requires REPO.
      Set OWNER to target a specific user or organisation.
      Example: OWNER=myorg REPO=legacy-project
    requires:
      vars:
        - REPO
    deps:
      - install
    cmds:
      - gh repo archive {{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}} --yes

  repo:delete:danger:
    desc: Permanently delete a GitHub repository
    summary: |
      Permanently delete a GitHub repository. Requires REPO.
      All code, issues, pull requests, and history will be lost.
      This action is irreversible.
      Example: OWNER=myorg REPO=old-project
    requires:
      vars:
        - REPO
    prompt:
      - "This will permanently delete the repository {{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}}."
      - All code, issues, pull requests, and history will be permanently lost.
      - This action cannot be undone. Are you sure you want to continue?
    deps:
      - install
    cmds:
      - gh repo delete {{if .OWNER}}{{.OWNER}}/{{end}}{{.REPO}} --yes

  pr:list:
    desc: List open pull requests in the current repository
    summary: List open pull requests for the current repository via `gh pr list`.
    deps:
      - install
    cmds:
      - gh pr list

  pr:status:
    desc: Show pull request status for the current branch
    summary: Display the status of pull requests related to the current branch via `gh pr status`.
    deps:
      - install
    cmds:
      - gh pr status

  pr:view:
    desc: View a pull request in the terminal or browser
    summary: |
      View the pull request for the current branch, or the PR specified by
      PR_NUMBER. Example: PR_NUMBER=42
    deps:
      - install
    cmds:
      - gh pr view {{.PR_NUMBER}}

  pr:create:
    desc: Create a new pull request for the current branch
    summary: |
      Create a pull request interactively. Optionally set PR_TITLE, PR_BODY,
      BASE (default: main), and HEAD to pre-fill fields.
      Example: PR_TITLE="Add feature" BASE=main
    deps:
      - install
    cmds:
      - >-
        gh pr create
        {{if .PR_TITLE}}--title "{{.PR_TITLE}}"{{end}}
        {{if .PR_BODY}}--body "{{.PR_BODY}}"{{end}}
        {{if .BASE}}--base {{.BASE}}{{end}}
        {{if .HEAD}}--head {{.HEAD}}{{end}}

  pr:checkout:
    desc: Check out a pull request branch locally
    summary: |
      Check out the branch for the pull request specified by PR_NUMBER.
      Requires PR_NUMBER. Example: PR_NUMBER=42
    requires:
      vars:
        - PR_NUMBER
    deps:
      - install
    cmds:
      - gh pr checkout {{.PR_NUMBER}}

  pr:diff:
    desc: Show the diff for a pull request
    summary: |
      Show the diff for the current branch's PR, or for PR_NUMBER.
      Example: PR_NUMBER=42
    deps:
      - install
    cmds:
      - gh pr diff {{.PR_NUMBER}}

  pr:review:
    desc: Add a review to a pull request
    summary: |
      Open an interactive review for the current branch's PR, or for PR_NUMBER.
      Example: PR_NUMBER=42
    deps:
      - install
    cmds:
      - gh pr review {{.PR_NUMBER}}

  pr:merge:
    desc: Merge a pull request
    summary: |
      Merge the pull request specified by PR_NUMBER. MERGE_METHOD controls
      the merge strategy: merge (default), squash, or rebase.
      Requires PR_NUMBER. Example: PR_NUMBER=42 MERGE_METHOD=squash
    requires:
      vars:
        - PR_NUMBER
    deps:
      - install
    cmds:
      - gh pr merge {{.PR_NUMBER}} --{{default "merge" .MERGE_METHOD}}

  pr:close:
    desc: Close a pull request without merging
    summary: |
      Close the pull request specified by PR_NUMBER without merging.
      Requires PR_NUMBER. Example: PR_NUMBER=42
    requires:
      vars:
        - PR_NUMBER
    deps:
      - install
    cmds:
      - gh pr close {{.PR_NUMBER}}

  pr:ready:
    desc: Mark a draft pull request as ready for review
    summary: |
      Convert a draft PR to ready-for-review state.
      Optionally set PR_NUMBER; otherwise uses the current branch's PR.
      Example: PR_NUMBER=42
    deps:
      - install
    cmds:
      - gh pr ready {{.PR_NUMBER}}

  pr:comment:
    desc: Add a comment to a pull request
    summary: |
      Post a comment on the pull request specified by PR_NUMBER.
      Requires PR_NUMBER and PR_BODY. Example: PR_NUMBER=42 PR_BODY="LGTM!"
    requires:
      vars:
        - PR_NUMBER
        - PR_BODY
    deps:
      - install
    cmds:
      - gh pr comment {{.PR_NUMBER}} --body "{{.PR_BODY}}"

  issue:list:
    desc: List open issues in the current repository
    summary: List open issues for the current repository via `gh issue list`.
    deps:
      - install
    cmds:
      - gh issue list

  issue:view:
    desc: View an issue in the terminal or browser
    summary: |
      View the issue specified by ISSUE_NUMBER.
      Requires ISSUE_NUMBER. Example: ISSUE_NUMBER=10
    requires:
      vars:
        - ISSUE_NUMBER
    deps:
      - install
    cmds:
      - gh issue view {{.ISSUE_NUMBER}}

  issue:create:
    desc: Create a new issue in the current repository
    summary: |
      Create an issue interactively. Optionally set ISSUE_TITLE and ISSUE_BODY
      to pre-fill fields. Example: ISSUE_TITLE="Bug report" ISSUE_BODY="..."
    deps:
      - install
    cmds:
      - >-
        gh issue create
        {{if .ISSUE_TITLE}}--title "{{.ISSUE_TITLE}}"{{end}}
        {{if .ISSUE_BODY}}--body "{{.ISSUE_BODY}}"{{end}}

  issue:comment:
    desc: Add a comment to an issue
    summary: |
      Post a comment on the issue specified by ISSUE_NUMBER.
      Requires ISSUE_NUMBER and ISSUE_BODY.
      Example: ISSUE_NUMBER=10 ISSUE_BODY="Thanks for the report!"
    requires:
      vars:
        - ISSUE_NUMBER
        - ISSUE_BODY
    deps:
      - install
    cmds:
      - gh issue comment {{.ISSUE_NUMBER}} --body "{{.ISSUE_BODY}}"

  issue:close:
    desc: Close an issue
    summary: |
      Close the issue specified by ISSUE_NUMBER.
      Requires ISSUE_NUMBER. Example: ISSUE_NUMBER=10
    requires:
      vars:
        - ISSUE_NUMBER
    deps:
      - install
    cmds:
      - gh issue close {{.ISSUE_NUMBER}}

  issue:reopen:
    desc: Reopen a previously closed issue
    summary: |
      Reopen the issue specified by ISSUE_NUMBER.
      Requires ISSUE_NUMBER. Example: ISSUE_NUMBER=10
    requires:
      vars:
        - ISSUE_NUMBER
    deps:
      - install
    cmds:
      - gh issue reopen {{.ISSUE_NUMBER}}

  issue:assign:
    desc: Assign a GitHub user to an issue
    summary: |
      Assign ASSIGNEE to the issue specified by ISSUE_NUMBER.
      Requires ISSUE_NUMBER and ASSIGNEE.
      Example: ISSUE_NUMBER=10 ASSIGNEE=octocat
    requires:
      vars:
        - ISSUE_NUMBER
        - ASSIGNEE
    deps:
      - install
    cmds:
      - gh issue edit {{.ISSUE_NUMBER}} --add-assignee {{.ASSIGNEE}}

  issue:label:
    desc: Add a label to an issue
    summary: |
      Add LABEL to the issue specified by ISSUE_NUMBER.
      Requires ISSUE_NUMBER and LABEL.
      Example: ISSUE_NUMBER=10 LABEL=bug
    requires:
      vars:
        - ISSUE_NUMBER
        - LABEL
    deps:
      - install
    cmds:
      - gh issue edit {{.ISSUE_NUMBER}} --add-label {{.LABEL}}

  workflow:list:
    desc: List GitHub Actions workflows in the current repository
    summary: List all available workflows via `gh workflow list`.
    deps:
      - install
    cmds:
      - gh workflow list

  workflow:view:
    desc: View a GitHub Actions workflow
    summary: |
      View the workflow specified by WORKFLOW (name or file).
      Example: WORKFLOW=ci.yml
    requires:
      vars:
        - WORKFLOW
    deps:
      - install
    cmds:
      - gh workflow view {{.WORKFLOW}}

  workflow:run:
    desc: Trigger a GitHub Actions workflow dispatch event
    summary: |
      Manually trigger the workflow specified by WORKFLOW. Optionally set
      BRANCH to run on a specific branch (defaults to the default branch).
      Requires WORKFLOW. Example: WORKFLOW=deploy.yml BRANCH=main
    requires:
      vars:
        - WORKFLOW
    deps:
      - install
    cmds:
      - gh workflow run {{.WORKFLOW}} {{if .BRANCH}}--ref {{.BRANCH}}{{end}}

  workflow:watch:
    desc: Watch a GitHub Actions workflow run in real time
    summary: |
      Watch the most recent run of WORKFLOW until it completes.
      Requires WORKFLOW. Example: WORKFLOW=ci.yml
    requires:
      vars:
        - WORKFLOW
    deps:
      - install
      - jq:install
    cmds:
      - task: _workflow:watch:unix
      - task: _workflow:watch:windows

  run:list:
    desc: List recent GitHub Actions runs in the current repository
    summary: List recent workflow runs via `gh run list`.
    deps:
      - install
    cmds:
      - gh run list

  run:view:
    desc: View a specific GitHub Actions workflow run
    summary: |
      View the run specified by RUN_ID.
      Requires RUN_ID. Example: RUN_ID=1234567890
    requires:
      vars:
        - RUN_ID
    deps:
      - install
    cmds:
      - gh run view {{.RUN_ID}}

  run:logs:
    desc: View logs for a GitHub Actions workflow run
    summary: |
      Print the logs for the run specified by RUN_ID.
      Requires RUN_ID. Example: RUN_ID=1234567890
    requires:
      vars:
        - RUN_ID
    deps:
      - install
    cmds:
      - gh run view {{.RUN_ID}} --log

  run:rerun:
    desc: Re-run a GitHub Actions workflow run
    summary: |
      Re-run the workflow run specified by RUN_ID.
      Requires RUN_ID. Example: RUN_ID=1234567890
    requires:
      vars:
        - RUN_ID
    deps:
      - install
    cmds:
      - gh run rerun {{.RUN_ID}}

  run:cancel:
    desc: Cancel a running GitHub Actions workflow run
    summary: |
      Cancel the workflow run specified by RUN_ID.
      Requires RUN_ID. Example: RUN_ID=1234567890
    requires:
      vars:
        - RUN_ID
    deps:
      - install
    cmds:
      - gh run cancel {{.RUN_ID}}

  release:list:
    desc: List releases in the current repository
    summary: |
      List all releases. Set OWNER and REPO to target a repo not owned by you
      (requires PAT_TOKEN with repo scope).
      Example: OWNER=hashicorp REPO=terraform PAT_TOKEN=ghp_...
    deps:
      - install
    cmds:
      - gh release list {{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}

  release:view:
    desc: View a GitHub release
    summary: |
      View the release specified by TAG. If TAG is unset, views the latest
      release. Set OWNER and REPO to target a repo not owned by you.
      Example: TAG=v1.0.0 OWNER=hashicorp REPO=terraform
    deps:
      - install
    cmds:
      - gh release view {{.TAG}} {{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}

  release:create:
    desc: Create a new GitHub release
    summary: |
      Create a release for the tag specified by TAG.
      Optionally set TITLE for the release title and NOTES for release notes.
      Set OWNER and REPO to create a release on a repo not owned by you
      (requires PAT_TOKEN with repo scope).
      Example: TAG=v1.0.0 TITLE="v1.0.0" NOTES="Bug fixes."
    requires:
      vars:
        - TAG
    deps:
      - install
    cmds:
      - >-
        gh release create {{.TAG}}
        {{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}
        {{if .TITLE}}--title "{{.TITLE}}"{{end}}
        {{if .NOTES}}--notes "{{.NOTES}}"{{end}}

  release:upload:
    desc: Upload an asset to an existing GitHub release
    summary: |
      Upload ASSET to the release identified by TAG.
      Set OWNER and REPO to target a repo not owned by you
      (requires PAT_TOKEN with repo scope).
      Example: TAG=v1.0.0 ASSET=./dist/app.tar.gz
    requires:
      vars:
        - TAG
        - ASSET
    deps:
      - install
    cmds:
      - gh release upload {{.TAG}} {{.ASSET}} {{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}

  release:download:
    desc: Download assets from a GitHub release
    summary: |
      Download release assets for the tag specified by TAG into DOWNLOAD_DIR.
      If TAG is unset, downloads assets from the latest release.
      Set OWNER and REPO to download from a repo not owned by you
      (requires PAT_TOKEN with repo scope for private repos).
      Example: TAG=v1.0.0 OWNER=hashicorp REPO=terraform DOWNLOAD_DIR=./dist
    deps:
      - install
    cmds:
      - >-
        gh release download {{.TAG}}
        {{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}
        {{if ne .DOWNLOAD_DIR "."}}--dir {{.DOWNLOAD_DIR}}{{end}}

  release:download:all:
    desc: Download assets from all releases in a repository
    summary: |
      Iterates every release tag and downloads its assets into DOWNLOAD_DIR/<tag>/.
      Set OWNER and REPO to target a repo not owned by you
      (requires PAT_TOKEN with repo scope for private repos).
      Example: OWNER=hashicorp REPO=terraform DOWNLOAD_DIR=./releases
    deps:
      - install
      - jq:install
    cmds:
      - task: _release:download:all:unix
      - task: _release:download:all:windows

  _release:download:all:unix:
    internal: true
    desc: Download all release assets on macOS/Linux
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    cmds:
      - |
        REPO_FLAG="{{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}"
        BASE_DIR="{{.DOWNLOAD_DIR}}"
        for tag in $(gh release list $REPO_FLAG --json tagName --jq '.[].tagName'); do
          dest="${BASE_DIR}/${tag}"
          mkdir -p "$dest"
          gh release download "$tag" $REPO_FLAG --dir "$dest" || true
        done

  _release:download:all:windows:
    internal: true
    desc: Download all release assets on Windows
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$repoFlag = '{{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}';
        $baseDir = '{{.DOWNLOAD_DIR}}';
        $tags = gh release list $repoFlag --json tagName --jq '.[].tagName';
        foreach ($tag in $tags) {
          $dest = Join-Path $baseDir $tag;
          New-Item -ItemType Directory -Force -Path $dest | Out-Null;
          gh release download $tag $repoFlag --dir $dest
        }"

  release:delete:danger:
    desc: Permanently delete a GitHub release
    summary: |
      Delete the release identified by TAG. The git tag is preserved;
      only the GitHub release record is removed.
      Set OWNER and REPO to target a repo not owned by you
      (requires PAT_TOKEN with delete_repo scope).
      Example: TAG=v0.1.0-beta
    requires:
      vars:
        - TAG
    prompt:
      - "This will permanently delete the GitHub release for tag {{.TAG}}."
      - The git tag itself will be preserved, but the release record will be gone.
      - Are you sure you want to continue?
    deps:
      - install
    cmds:
      - gh release delete {{.TAG}} --yes {{if .OWNER}}--repo {{.OWNER}}/{{.REPO}}{{end}}

  secret:list:
    desc: List GitHub Actions secrets for the current repository
    summary: |
      List the names of GitHub Actions secrets. Values are never shown.
      Optionally set ENVIRONMENT to list secrets for a specific environment.
      Example: ENVIRONMENT=production
    deps:
      - install
    cmds:
      - gh secret list {{if .ENVIRONMENT}}--env {{.ENVIRONMENT}}{{end}}

  secret:set:
    desc: Create or update a GitHub Actions secret
    summary: |
      Set a secret named SECRET_NAME to SECRET_VALUE. The value is piped
      via stdin to avoid exposure in the process list.
      Optionally set ENVIRONMENT to target a specific environment.
      Requires SECRET_NAME and SECRET_VALUE.
      Example: SECRET_NAME=MY_TOKEN SECRET_VALUE=abc123
    requires:
      vars:
        - SECRET_NAME
        - SECRET_VALUE
    deps:
      - install
    cmds:
      - task: _secret:set:unix
      - task: _secret:set:windows

  secret:delete:danger:
    desc: Permanently delete a GitHub Actions secret
    summary: |
      Delete the secret named SECRET_NAME. This action is irreversible.
      Optionally set ENVIRONMENT to target a specific environment.
      Requires SECRET_NAME. Example: SECRET_NAME=MY_TOKEN
    requires:
      vars:
        - SECRET_NAME
    prompt:
      - "This will permanently delete the secret {{.SECRET_NAME}}."
      - Any workflows depending on this secret will break until it is re-created.
      - Are you sure you want to continue?
    deps:
      - install
    cmds:
      - gh secret delete {{.SECRET_NAME}} {{if .ENVIRONMENT}}--env {{.ENVIRONMENT}}{{end}}

  variable:list:
    desc: List GitHub Actions variables for the current repository
    summary: |
      List GitHub Actions variables (non-secret configuration values).
      Optionally set ENVIRONMENT to list variables for a specific environment.
      Example: ENVIRONMENT=staging
    deps:
      - install
    cmds:
      - gh variable list {{if .ENVIRONMENT}}--env {{.ENVIRONMENT}}{{end}}

  variable:set:
    desc: Create or update a GitHub Actions variable
    summary: |
      Set a variable named VARIABLE_NAME to VARIABLE_VALUE.
      Optionally set ENVIRONMENT to target a specific environment.
      Requires VARIABLE_NAME and VARIABLE_VALUE.
      Example: VARIABLE_NAME=APP_ENV VARIABLE_VALUE=production
    requires:
      vars:
        - VARIABLE_NAME
        - VARIABLE_VALUE
    deps:
      - install
    cmds:
      - >-
        gh variable set {{.VARIABLE_NAME}}
        --body "{{.VARIABLE_VALUE}}"
        {{if .ENVIRONMENT}}--env {{.ENVIRONMENT}}{{end}}

  variable:delete:danger:
    desc: Permanently delete a GitHub Actions variable
    summary: |
      Delete the variable named VARIABLE_NAME. This action is irreversible.
      Optionally set ENVIRONMENT to target a specific environment.
      Requires VARIABLE_NAME. Example: VARIABLE_NAME=APP_ENV
    requires:
      vars:
        - VARIABLE_NAME
    prompt:
      - "This will permanently delete the variable {{.VARIABLE_NAME}}."
      - Are you sure you want to continue?
    deps:
      - install
    cmds:
      - gh variable delete {{.VARIABLE_NAME}} {{if .ENVIRONMENT}}--env {{.ENVIRONMENT}}{{end}}

  gist:list:
    desc: List gists for the authenticated GitHub user
    summary: List all gists belonging to the authenticated user via `gh gist list`.
    deps:
      - install
    cmds:
      - gh gist list

  gist:view:
    desc: View a GitHub gist
    summary: |
      View the gist specified by GIST_ID.
      Requires GIST_ID. Example: GIST_ID=abc1234567890abcdef
    requires:
      vars:
        - GIST_ID
    deps:
      - install
    cmds:
      - gh gist view {{.GIST_ID}}

  gist:create:
    desc: Create a new GitHub gist from a file
    summary: |
      Create a new gist from the file specified by FILE.
      Set DESCRIPTION for an optional gist description.
      Requires FILE. Example: FILE=./script.sh DESCRIPTION="Useful script"
    requires:
      vars:
        - FILE
    deps:
      - install
    cmds:
      - gh gist create {{.FILE}} {{if .DESCRIPTION}}--desc "{{.DESCRIPTION}}"{{end}}

  gist:delete:danger:
    desc: Permanently delete a GitHub gist
    summary: |
      Delete the gist specified by GIST_ID. This action is irreversible.
      Requires GIST_ID. Example: GIST_ID=abc1234567890abcdef
    requires:
      vars:
        - GIST_ID
    prompt:
      - "This will permanently delete gist {{.GIST_ID}}."
      - This action cannot be undone. Are you sure you want to continue?
    deps:
      - install
    cmds:
      - gh gist delete {{.GIST_ID}}

