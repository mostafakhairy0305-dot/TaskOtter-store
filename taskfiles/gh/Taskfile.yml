  _upgrade:auto:unix:
    internal: true
    desc: Auto-detect package manager and upgrade gh on macOS or Linux
    summary: |
      Detect the OS and available package manager, then upgrade gh to the
      latest version. On macOS uses brew. On Linux checks apt, dnf, snap,
      and brew in order and uses the first one found.
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    cmds:
      - |
        OS="$(uname -s)"
        if [ "$OS" = "Darwin" ]; then
          brew upgrade gh
        elif [ "$OS" = "Linux" ]; then
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get install --only-upgrade -y gh
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf upgrade -y gh
          elif command -v snap >/dev/null 2>&1 && snap list gh >/dev/null 2>&1; then
            sudo snap refresh gh
          elif command -v brew >/dev/null 2>&1; then
            brew upgrade gh
          else
            echo 'ERROR: Could not detect a supported package manager for upgrade.'
            echo 'See https://cli.github.com/manual/installation'
            exit 1
          fi
        fi

  _upgrade:auto:windows:
    internal: true
    desc: Auto-detect package manager and upgrade gh on Windows
    summary: |
      Detect available package managers on Windows and upgrade gh to the latest
      version. Prefers winget, then Chocolatey, then Scoop.
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command winget -ErrorAction SilentlyContinue) {
        winget upgrade --id GitHub.cli --accept-source-agreements --accept-package-agreements }
        elseif (Get-Command choco -ErrorAction SilentlyContinue) { choco upgrade gh -y }
        elseif (Get-Command scoop -ErrorAction SilentlyContinue) { scoop update gh }
        else { Write-Error 'ERROR: No supported package manager detected for upgrade.'; exit 1 }"

  _upgrade:macos:brew:
    internal: true
    desc: Upgrade gh on macOS using Homebrew
    summary: Run `brew upgrade gh` on macOS.
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
