---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  uv:
    taskfile: ../uv/Taskfile.yml

vars:
  UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
  TARGETS: "."
  EXTRA_ARGS: ""
  JSONLINT_VERSION: ""

tasks:
  default:
    run: once
    desc: Show available jsonlint automation tasks
    summary: Display the list of available jsonlint-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    run: once
    desc: Install the jsonlint CLI on the current operating system
    summary: |
      Install the jsonlint CLI via uv tool install for the current platform.
      The command-line tool is provided by the demjson3 package on PyPI.
      Pass JSONLINT_VERSION to pin a specific demjson3 release instead of the
      latest. uv manages an isolated environment so the tool never conflicts
      with project dependencies. Installs uv first if it is not already present.
    cmds:
      - task: _install:unix
      - task: _install:windows

  install:undo:
    run: once
    desc: Remove the jsonlint CLI from the current operating system
    summary: |
      Remove the jsonlint CLI via uv tool uninstall on all platforms.
      The uv-managed isolated environment is cleaned up automatically.
    aliases:
      - uninstall
    prompt:
      - This will remove the jsonlint CLI from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows

  upgrade:
    run: once
    desc: Upgrade the jsonlint CLI to the latest release
    summary: |
      Upgrade the jsonlint CLI by reinstalling the demjson3 package via uv on
      all platforms. Honors JSONLINT_VERSION when set.
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows

  version:
    run: once
    desc: Show the installed jsonlint version
    summary: Print the active jsonlint version. Auto-installs jsonlint if missing.
    deps:
      - install
    cmds:
      - cmd: bash -lc '{{.UV_LOAD}}; jsonlint --version'
        platforms: [linux, darwin]
      - cmd: jsonlint --version
        platforms: [windows]

  lint:
    run: once
    desc: Validate JSON files with jsonlint (TARGETS=path)
    summary: |
      Validate the JSON files at TARGETS (default .). A directory target is
      scanned recursively for *.json files; a file target is validated
      directly. Pass EXTRA_ARGS for additional flags.
      Auto-installs jsonlint if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: >-
          bash -lc '{{.UV_LOAD}};
          _t="{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}";
          if [ -d "$_t" ]; then
          if [ -n "$(find "$_t" -name "*.json" -print -quit)" ]; then
          find "$_t" -name "*.json" -print0 | xargs -0 jsonlint
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}};
          else echo "No JSON files found under $_t"; fi;
          else jsonlint
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
          "$_t"; fi
          && echo "✅ jsonlint passed" || { echo "❌ jsonlint failed"; exit 1; }'
        platforms: [linux, darwin]
      - cmd: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "$ErrorActionPreference = 'Stop';
          $t = '{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}';
          if (Test-Path -LiteralPath $t -PathType Container) {
          Get-ChildItem -LiteralPath $t -Recurse -Filter *.json | ForEach-Object {
          jsonlint {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}} $_.FullName;
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE } }
          } else {
          jsonlint {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}} $t;
          exit $LASTEXITCODE }"
        platforms: [windows]

  _install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        bash -lc '{{.UV_LOAD}}; command -v jsonlint >/dev/null 2>&1
        && { [ -z "{{.JSONLINT_VERSION}}" ]
        || uv tool list 2>/dev/null | grep -Fq "demjson3 v{{.JSONLINT_VERSION}}"; }'
    deps:
      - uv:install
    cmds:
      - echo 'Installing the jsonlint CLI via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "demjson3{{if .JSONLINT_VERSION}}=={{.JSONLINT_VERSION}}{{end}}"'
      - echo 'jsonlint installed.'

  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$jsonlint = Get-Command jsonlint -ErrorAction SilentlyContinue;
        if (-not $jsonlint) { exit 1 };
        $requested = '{{.JSONLINT_VERSION}}';
        if ([string]::IsNullOrWhiteSpace($requested)
        -or ((uv tool list | Out-String) -match ('demjson3 v' + [regex]::Escape($requested)))) { exit 0 };
        exit 1"
    deps:
      - uv:install
    cmds:
      - echo Installing the jsonlint CLI via uv...
      - uv tool install --force "demjson3{{if .JSONLINT_VERSION}}=={{.JSONLINT_VERSION}}{{end}}"
      - echo jsonlint installed.

  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - bash -lc '{{.UV_LOAD}}; ! command -v jsonlint >/dev/null 2>&1'
    cmds:
      - echo 'Removing jsonlint...'
      - bash -lc '{{.UV_LOAD}}; uv tool uninstall demjson3'
      - echo 'jsonlint removed.'

  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command jsonlint -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing jsonlint via uv...
      - uv tool uninstall demjson3
      - echo jsonlint removed.

  _upgrade:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: bash -lc '{{.UV_LOAD}}; command -v jsonlint >/dev/null 2>&1'
        msg: jsonlint is not installed. Run task install first.
    cmds:
      - echo 'Upgrading jsonlint via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "demjson3{{if .JSONLINT_VERSION}}=={{.JSONLINT_VERSION}}{{end}}"'
      - echo 'jsonlint upgraded.'

  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command jsonlint -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: jsonlint is not installed. Run task install first.
    cmds:
      - echo Upgrading jsonlint via uv...
      - uv tool install --force "demjson3{{if .JSONLINT_VERSION}}=={{.JSONLINT_VERSION}}{{end}}"
      - echo jsonlint upgraded.
