---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  go:
    taskfile: ../go/Taskfile.yml

vars:
  GO_CMD:
    sh: |
      if command -v go >/dev/null 2>&1; then
        command -v go
      elif [ "$(uname -s 2>/dev/null || true)" = "Linux" ]; then
        printf '%s' "/usr/local/go/bin/go"
      else
        printf '%s' "go"
      fi
  GLOBAL_GO_BIN:
    sh: |
      go_cmd="{{.GO_CMD}}"
      gobin="${GOBIN:-}"
      if [ -z "$gobin" ] && { command -v "$go_cmd" >/dev/null 2>&1 || [ -x "$go_cmd" ]; }; then
        gobin="$("$go_cmd" env GOBIN 2>/dev/null || true)"
      fi
      if [ -z "$gobin" ]; then
        gopath="${GOPATH:-}"
        if [ -z "$gopath" ] && { command -v "$go_cmd" >/dev/null 2>&1 || [ -x "$go_cmd" ]; }; then
          gopath="$("$go_cmd" env GOPATH 2>/dev/null || true)"
        fi
        gobin="${gopath:-$HOME/go}/bin"
      fi
      printf '%s' "$gobin"
  PROTO_PATH: "."
  PROTO_PATTERN: "*.proto"
  GO_MODULE: ""
  PROTOC_GEN_GO_VERSION: "v1.36.5"
  PROTOC_GEN_GO_GRPC_VERSION: "v1.5.1"
  PROTOC_VERSION: "34.0"

tasks:
  default:
    desc: Show available protoc automation tasks
    summary: Display the list of available protobuf-related tasks defined in this Taskfile.
    cmds:
      - task --list

  gen:
    desc: Generate Go files from proto definitions
    summary: |
      Run protoc to generate Go and gRPC source files from all .proto files
      matching PROTO_PATTERN under PROTO_PATH. Auto-installs protoc and the
      Go plugins globally if they are not already present in PATH.
    deps:
      - install
    cmds:
      - task: _gen:unix
        vars:
          PROTO_PATH: "{{.PROTO_PATH}}"
          PROTO_PATH_OVERRIDE: "{{.PROTO_PATH_OVERRIDE}}"
          PROTO_PATTERN: "{{.PROTO_PATTERN}}"
          PROTO_PATTERN_OVERRIDE: "{{.PROTO_PATTERN_OVERRIDE}}"
          GO_MODULE: "{{.GO_MODULE}}"
      - task: _gen:windows
        vars:
          PROTO_PATH: "{{.PROTO_PATH}}"
          PROTO_PATH_OVERRIDE: "{{.PROTO_PATH_OVERRIDE}}"
          PROTO_PATTERN: "{{.PROTO_PATTERN}}"
          PROTO_PATTERN_OVERRIDE: "{{.PROTO_PATTERN_OVERRIDE}}"
          GO_MODULE: "{{.GO_MODULE}}"

  install:
    run: once
    desc: Install protoc and Go proto plugins on the current operating system
    summary: |
      Install protoc and the Go protobuf plugins for the current platform if
      they are not already available in PATH. macOS uses Homebrew for protoc.
      Linux downloads the pinned PROTOC_VERSION release into /usr/local.
      Windows uses Scoop for protoc. Go plugins are installed into the global
      Go bin (GOBIN or GOPATH/bin).
    deps:
      - go:install
    cmds:
      - task: _install:protoc:macos
      - task: _install:protoc:linux
      - task: _install:protoc:windows
      - task: _install:plugins

  install:undo:
    desc: Remove protoc and Go proto plugins from the current operating system
    summary: |
      Remove protoc for the current platform and delete the Go plugin binaries
      from the global Go bin. macOS uses Homebrew to uninstall protoc. Linux
      removes protoc from /usr/local/bin and bundled includes from
      /usr/local/include/google/protobuf. Windows uses Scoop to uninstall protoc.
    aliases:
      - uninstall
    prompt:
      - This will remove protoc and all proto plugins from this machine.
      - Continue?
    cmds:
      - task: _install:undo:protoc:macos
      - task: _install:undo:protoc:linux
      - task: _install:undo:protoc:windows
      - task: _install:undo:plugins

  upgrade:
    desc: Upgrade protoc and Go proto plugins
    summary: |
      Upgrade protoc and the Go protobuf plugins. macOS uses brew upgrade protobuf.
      Linux re-downloads the pinned PROTOC_VERSION release. Windows uses
      scoop update protobuf. Go plugins are reinstalled at their pinned versions.
    deps:
      - go:install
    cmds:
      - task: _upgrade:protoc:macos
      - task: _upgrade:protoc:linux
      - task: _upgrade:protoc:windows
      - task: _install:plugins
        vars:
          FORCE: "true"

  ungen:
    desc: Remove generated protobuf (.pb.go) files from the working tree
    summary: |
      Delete all *.pb.go files generated by protoc. Useful before a clean
      regeneration to ensure stale files are not left behind.
    cmds:
      - task: _ungen:unix
      - task: _ungen:windows

  version:
    desc: Show the installed protoc version
    summary: Print the active protoc version via protoc --version. Auto-installs protoc if missing.
    deps:
      - install
    cmds:
      - protoc --version

  _gen:unix:
    internal: true
    platforms: [darwin, linux]
    set: [errexit, nounset, pipefail]
    env:
      GO_MODULE: "{{.GO_MODULE}}"
    vars:
      RESOLVED_PROTO_PATH: '{{if .PROTO_PATH_OVERRIDE}}{{.PROTO_PATH_OVERRIDE}}{{else}}{{.PROTO_PATH}}{{end}}'
      RESOLVED_PROTO_PATTERN: '{{default .PROTO_PATTERN .PROTO_PATTERN_OVERRIDE}}'
    cmds:
      - |
        export PATH="{{.GLOBAL_GO_BIN}}:$PATH"
        module_opts=""
        if [ -n "${GO_MODULE:-}" ]; then
          module_opts="--go_opt=module=${GO_MODULE} --go-grpc_opt=module=${GO_MODULE}"
        fi
        if [ -z "$(find "{{.RESOLVED_PROTO_PATH}}" -type f \
          -name "{{.RESOLVED_PROTO_PATTERN}}" \
          ! -path "*/.git/*" -print -quit)" ]; then
          echo "No .proto files found under {{.RESOLVED_PROTO_PATH}} matching -name {{.RESOLVED_PROTO_PATTERN}}"
          exit 1
        fi
        find "{{.RESOLVED_PROTO_PATH}}" -type f -name "{{.RESOLVED_PROTO_PATTERN}}" ! -path "*/.git/*" \
          -exec protoc --proto_path="{{.RESOLVED_PROTO_PATH}}" \
          --go_out=. ${module_opts} \
          --go-grpc_out=. ${module_opts} \
          {} +

  _gen:windows:
    internal: true
    platforms: [windows]
    env:
      GO_MODULE: "{{.GO_MODULE}}"
    vars:
      RESOLVED_PROTO_PATH: '{{if .PROTO_PATH_OVERRIDE}}{{.PROTO_PATH_OVERRIDE}}{{else}}{{.PROTO_PATH}}{{end}}'
      RESOLVED_PROTO_PATTERN: '{{default .PROTO_PATTERN .PROTO_PATTERN_OVERRIDE}}'
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$ErrorActionPreference='Stop';
        $env:Path='{{.GLOBAL_GO_BIN}};' + $env:Path;
        $moduleOpts = @();
        if ($env:GO_MODULE) {
          $moduleOpts = @('--go_opt=module=' + $env:GO_MODULE, '--go-grpc_opt=module=' + $env:GO_MODULE);
        }
        $protos = Get-ChildItem -Path '{{.RESOLVED_PROTO_PATH}}' -Recurse -Filter '{{.RESOLVED_PROTO_PATTERN}}' -File |
          Where-Object { $_.FullName -notmatch '\\\.git\\' };
        if (-not $protos) { throw 'No .proto files found' };
        protoc
          --proto_path='{{.RESOLVED_PROTO_PATH}}'
          --go_out=.
          @($moduleOpts)
          --go-grpc_out=.
          @($moduleOpts)
          @($protos | ForEach-Object { $_.FullName })"

  _install:protoc:macos:
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - command -v protoc >/dev/null 2>&1
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to install protoc on macOS. Install it from https://brew.sh and re-run this task.
    cmds:
      - echo 'Installing protoc via Homebrew...'
      - brew install protobuf
      - echo 'protoc installed.'

  _install:protoc:linux:
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      PROTOC_UNAME_ARCH:
        sh: uname -m
      PROTOC_ARCH: >-
        {{if or (eq .PROTOC_UNAME_ARCH "x86_64") (eq .PROTOC_UNAME_ARCH "amd64")}}x86_64
        {{- else if or (eq .PROTOC_UNAME_ARCH "aarch64") (eq .PROTOC_UNAME_ARCH "arm64")}}aarch_64
        {{- else}}{{.PROTOC_UNAME_ARCH}}{{end}}
      PROTOC_ARCHIVE: "/tmp/taskotter-protoc-{{.PROTOC_VERSION}}.zip"
      PROTOC_TMP_DIR: "/tmp/taskotter-protoc-{{.PROTOC_VERSION}}"
    status:
      - command -v protoc >/dev/null 2>&1
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download protoc.
      - sh: command -v unzip >/dev/null 2>&1
        msg: unzip is required to extract protoc.
      - sh: >-
          [ "{{.PROTOC_ARCH}}" = "x86_64" ] || [ "{{.PROTOC_ARCH}}" = "aarch_64" ]
        msg: Unsupported Linux architecture. Only x86_64 and aarch64 are supported.
    cmds:
      - echo 'Installing protoc v{{.PROTOC_VERSION}} for Linux ({{.PROTOC_ARCH}})...'
      - mkdir -p "{{.PROTOC_TMP_DIR}}"
      - >-
        archive_url="https://github.com/protocolbuffers/protobuf/releases/download/v{{.PROTOC_VERSION}}";
        archive_url="${archive_url}/protoc-{{.PROTOC_VERSION}}-linux-{{.PROTOC_ARCH}}.zip";
        curl -fsSL -o "{{.PROTOC_ARCHIVE}}" "$archive_url"
      - unzip -o "{{.PROTOC_ARCHIVE}}" -d "{{.PROTOC_TMP_DIR}}"
      - cmd: cp "{{.PROTOC_TMP_DIR}}/bin/protoc" /usr/local/bin/protoc
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: cp -R "{{.PROTOC_TMP_DIR}}/include/." /usr/local/include/
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: chmod +x /usr/local/bin/protoc
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo cp "{{.PROTOC_TMP_DIR}}/bin/protoc" /usr/local/bin/protoc
        if: '[ "$(id -u)" -ne 0 ]'
      - cmd: sudo cp -R "{{.PROTOC_TMP_DIR}}/include/." /usr/local/include/
        if: '[ "$(id -u)" -ne 0 ]'
      - cmd: sudo chmod +x /usr/local/bin/protoc
        if: '[ "$(id -u)" -ne 0 ]'
      - rm -rf "{{.PROTOC_ARCHIVE}}" "{{.PROTOC_TMP_DIR}}"
      - echo 'protoc installed.'

  _install:protoc:windows:
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command protoc -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command scoop -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Scoop is required to install protoc on Windows. Install it from https://scoop.sh and re-run this task.
    cmds:
      - echo Installing protoc via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop install protobuf"
      - echo protoc installed. Restart your terminal if protoc is not found.

  _install:plugins:
    internal: true
    set: [errexit, nounset, pipefail]
    status:
      - test -x "{{.GLOBAL_GO_BIN}}/protoc-gen-go"
      - test -x "{{.GLOBAL_GO_BIN}}/protoc-gen-go-grpc"
      - '[ "{{.FORCE}}" != "true" ]'
    preconditions:
      - sh: command -v "{{.GO_CMD}}" >/dev/null 2>&1 || test -x "{{.GO_CMD}}"
        msg: Go is required to install protoc-gen-go and protoc-gen-go-grpc.
    cmds:
      - mkdir -p "{{.GLOBAL_GO_BIN}}"
      - >-
        GOBIN="{{.GLOBAL_GO_BIN}}"
        "{{.GO_CMD}}" install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
      - >-
        GOBIN="{{.GLOBAL_GO_BIN}}"
        "{{.GO_CMD}}" install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
      - echo 'protoc Go plugins installed.'

  _install:undo:protoc:macos:
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v protoc >/dev/null 2>&1"
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to remove protoc on macOS.
    cmds:
      - echo 'Removing protoc via Homebrew...'
      - brew uninstall protobuf
      - echo 'protoc removed.'

  _install:undo:protoc:linux:
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! command -v protoc >/dev/null 2>&1"
    cmds:
      - echo 'Removing protoc...'
      - cmd: rm -f /usr/local/bin/protoc
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: rm -rf /usr/local/include/google/protobuf
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo rm -f /usr/local/bin/protoc
        if: '[ "$(id -u)" -ne 0 ]'
      - cmd: sudo rm -rf /usr/local/include/google/protobuf
        if: '[ "$(id -u)" -ne 0 ]'
      - echo 'protoc removed.'

  _install:undo:protoc:windows:
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command protoc -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing protoc via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop uninstall protobuf"
      - echo protoc removed.

  _install:undo:plugins:
    internal: true
    cmds:
      - task: _install:undo:plugins:unix
      - task: _install:undo:plugins:windows

  _install:undo:plugins:unix:
    internal: true
    platforms: [darwin, linux]
    set: [errexit, nounset, pipefail]
    status:
      - "! test -x '{{.GLOBAL_GO_BIN}}/protoc-gen-go'"
      - "! test -x '{{.GLOBAL_GO_BIN}}/protoc-gen-go-grpc'"
    cmds:
      - echo 'Removing protoc Go plugins from {{.GLOBAL_GO_BIN}}...'
      - rm -f "{{.GLOBAL_GO_BIN}}/protoc-gen-go" "{{.GLOBAL_GO_BIN}}/protoc-gen-go-grpc"
      - echo 'protoc Go plugins removed.'

  _install:undo:plugins:windows:
    internal: true
    platforms: [windows]
    cmds:
      - echo Removing protoc Go plugins...
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "Remove-Item -Force
        '{{.GLOBAL_GO_BIN}}\protoc-gen-go.exe',
        '{{.GLOBAL_GO_BIN}}\protoc-gen-go-grpc.exe'
        -ErrorAction SilentlyContinue"
      - echo protoc Go plugins removed.

  _upgrade:protoc:macos:
    internal: true
    platforms: [darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: command -v brew >/dev/null 2>&1
        msg: Homebrew is required to upgrade protoc on macOS.
    cmds:
      - echo 'Upgrading protoc via Homebrew...'
      - cmd: brew upgrade protobuf
        if: brew list protobuf >/dev/null 2>&1
      - cmd: brew install protobuf
        if: "! brew list protobuf >/dev/null 2>&1"
      - echo 'protoc upgraded.'

  _upgrade:protoc:linux:
    internal: true
    platforms: [linux]
    set: [errexit, nounset, pipefail]
    vars:
      PROTOC_UNAME_ARCH:
        sh: uname -m
      PROTOC_ARCH: >-
        {{if or (eq .PROTOC_UNAME_ARCH "x86_64") (eq .PROTOC_UNAME_ARCH "amd64")}}x86_64
        {{- else if or (eq .PROTOC_UNAME_ARCH "aarch64") (eq .PROTOC_UNAME_ARCH "arm64")}}aarch_64
        {{- else}}{{.PROTOC_UNAME_ARCH}}{{end}}
      PROTOC_ARCHIVE: "/tmp/taskotter-protoc-{{.PROTOC_VERSION}}.zip"
      PROTOC_TMP_DIR: "/tmp/taskotter-protoc-{{.PROTOC_VERSION}}"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required to download protoc.
      - sh: command -v unzip >/dev/null 2>&1
        msg: unzip is required to extract protoc.
      - sh: >-
          [ "{{.PROTOC_ARCH}}" = "x86_64" ] || [ "{{.PROTOC_ARCH}}" = "aarch_64" ]
        msg: Unsupported Linux architecture. Only x86_64 and aarch64 are supported.
    cmds:
      - echo 'Upgrading protoc to v{{.PROTOC_VERSION}} for Linux ({{.PROTOC_ARCH}})...'
      - mkdir -p "{{.PROTOC_TMP_DIR}}"
      - >-
        archive_url="https://github.com/protocolbuffers/protobuf/releases/download/v{{.PROTOC_VERSION}}";
        archive_url="${archive_url}/protoc-{{.PROTOC_VERSION}}-linux-{{.PROTOC_ARCH}}.zip";
        curl -fsSL -o "{{.PROTOC_ARCHIVE}}" "$archive_url"
      - unzip -o "{{.PROTOC_ARCHIVE}}" -d "{{.PROTOC_TMP_DIR}}"
      - cmd: cp "{{.PROTOC_TMP_DIR}}/bin/protoc" /usr/local/bin/protoc
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: cp -R "{{.PROTOC_TMP_DIR}}/include/." /usr/local/include/
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: chmod +x /usr/local/bin/protoc
        if: '[ "$(id -u)" -eq 0 ]'
      - cmd: sudo cp "{{.PROTOC_TMP_DIR}}/bin/protoc" /usr/local/bin/protoc
        if: '[ "$(id -u)" -ne 0 ]'
      - cmd: sudo cp -R "{{.PROTOC_TMP_DIR}}/include/." /usr/local/include/
        if: '[ "$(id -u)" -ne 0 ]'
      - cmd: sudo chmod +x /usr/local/bin/protoc
        if: '[ "$(id -u)" -ne 0 ]'
      - rm -rf "{{.PROTOC_ARCHIVE}}" "{{.PROTOC_TMP_DIR}}"
      - echo 'protoc upgraded.'

  _upgrade:protoc:windows:
    internal: true
    platforms: [windows]
    cmds:
      - echo Upgrading protoc via Scoop...
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "scoop update protobuf"
      - echo protoc upgraded. Restart your terminal if prompted.

  _ungen:unix:
    internal: true
    platforms: [darwin, linux]
    set: [errexit, nounset, pipefail]
    cmds:
      - find . -type f -name "*.pb.go" -delete
      - echo 'Generated protobuf files removed.'

  _ungen:windows:
    internal: true
    platforms: [windows]
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "Get-ChildItem -Recurse -Filter *.pb.go | Remove-Item -Force"
      - echo Generated protobuf files removed.
