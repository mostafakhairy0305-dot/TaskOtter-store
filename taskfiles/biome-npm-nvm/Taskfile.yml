---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  npm:
    taskfile: ../npm-nvm/Taskfile.yml

vars:
  TARGETS: ""
  BIOME_DEFAULT_TARGETS: "."
  CONFIG: ""
  EXTRA_ARGS: ""
  VERSION: ""

tasks:
  default:
    desc: Show available Biome tasks
    cmds:
      - task --list

  install:
    run: once
    desc: Install Biome as a local devDependency
    summary: |
      Install @biomejs/biome as a local devDependency. Pass VERSION=x.y.z to
      pin a specific release instead of the package manager's default
      resolution.
    cmds:
      - task: npm:add
        vars:
          PACKAGES: >-
            @biomejs/biome{{if .VERSION_OVERRIDE}}@{{.VERSION_OVERRIDE}}
            {{- else if .VERSION}}@{{.VERSION}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  install:undo:
    desc: Remove the locally installed Biome devDependency
    summary: Remove @biomejs/biome from local devDependencies via the active package manager.
    aliases:
      - uninstall
    prompt:
      - This will remove @biomejs/biome from local devDependencies.
      - Continue?
    cmds:
      - task: npm:remove
        vars:
          PACKAGES: "@biomejs/biome"
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  upgrade:
    desc: Upgrade Biome to the latest release
    summary: Reinstall @biomejs/biome at the latest version as a local devDependency.
    cmds:
      - task: npm:add
        vars:
          PACKAGES: "@biomejs/biome@latest"
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  init:
    desc: Alias for biome:config:init
    cmds:
      - task: config:init

  config:init:
    desc: Create a biome.json config file in the current directory
    summary: |
      Run biome init to generate a biome.json config file with recommended
      defaults. Skipped if biome.json or biome.jsonc already exists.
    status:
      - test -f biome.json || test -f biome.jsonc
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: init
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  check:
    desc: Run Biome check
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: >-
            check
            {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}
            {{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}
            {{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ biome passed"

  check:write:
    desc: Run Biome check and write safe fixes
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: >-
            check --write
            {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}
            {{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}
            {{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ biome fixes applied"

  fix:
    desc: Alias for biome:check:write
    cmds:
      - task: check:write

  lint:
    desc: Run Biome lint
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: >-
            lint
            {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}
            {{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}
            {{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ biome passed"

  lint:fix:
    desc: Run Biome lint and write fixes
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: >-
            lint --write
            {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}
            {{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}
            {{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ biome fixes applied"

  fmt:check:
    desc: Check formatting with Biome
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: >-
            format
            {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}
            {{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}
            {{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  fmt:
    desc: Format files with Biome
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: >-
            format --write
            {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}
            {{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}
            {{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ biome fixes applied"

  ci:
    desc: Run Biome CI checks
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: >-
            ci
            {{if .CONFIG_OVERRIDE}}--config-path "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config-path "{{.CONFIG}}" {{end}}{{end}}
            {{if .BIOME_TARGETS_OVERRIDE}}{{.BIOME_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}
            {{else}}{{.BIOME_DEFAULT_TARGETS}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ biome passed"

  cache:clean:
    desc: Remove common Biome cache directories if present
    cmds:
      - if [ -d .cache/biome ]; then rm -rf .cache/biome; fi
      - if [ -d node_modules/.cache/biome ]; then rm -rf node_modules/.cache/biome; fi

  version:
    desc: Show the locally resolved Biome version
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: "--version"

  help:
    desc: Show Biome CLI help
    cmds:
      - task: npm:exec
        vars:
          BINARY: biome
          ARGS: "--help"
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
