---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  uv:
    taskfile: ../uv/Taskfile.yml

vars:
  UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
  TARGETS: "."
  EXTRA_ARGS: ""
  DJLINT_VERSION: ""

tasks:
  default:
    run: once
    desc: Show available djLint automation tasks
    summary: Display the list of available djLint-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    run: once
    desc: Install djLint on the current operating system
    summary: |
      Install djLint via uv tool install for the current platform.
      Pass DJLINT_VERSION to pin a specific release instead of the latest.
      uv manages an isolated environment so djLint never conflicts with
      project dependencies. Installs uv first if it is not already present.
    cmds:
      - task: _install:unix
      - task: _install:windows

  install:undo:
    run: once
    desc: Remove djLint from the current operating system
    summary: |
      Remove djLint via uv tool uninstall on all platforms.
      The uv-managed isolated environment is cleaned up automatically.
    aliases:
      - uninstall
    prompt:
      - This will remove djLint from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows

  upgrade:
    run: once
    desc: Upgrade djLint to the latest release
    summary: |
      Upgrade djLint by reinstalling it via uv on all platforms.
      Honors DJLINT_VERSION when set.
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows

  version:
    run: once
    desc: Show the installed djLint version
    summary: Print the active djLint version via djlint --version. Auto-installs djLint if missing.
    deps:
      - install
    cmds:
      - cmd: bash -lc '{{.UV_LOAD}}; djlint --version'
        platforms: [linux, darwin]
      - cmd: djlint --version
        platforms: [windows]

  lint:
    run: once
    desc: Lint HTML templates with djLint (TARGETS=path)
    summary: |
      Run djlint --lint against TARGETS (default .) to report template lint
      violations. Pass EXTRA_ARGS for additional flags such as
      --profile django. Auto-installs djLint if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: >-
          bash -lc '{{.UV_LOAD}};
          djlint
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          --lint
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
          && echo "✅ djlint passed" || { echo "❌ djlint failed"; exit 1; }'
        platforms: [linux, darwin]
      - cmd: >-
          djlint
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          --lint
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        platforms: [windows]

  fmt:
    run: once
    desc: Format HTML templates with djLint (TARGETS=path)
    summary: |
      Run djlint --reformat against TARGETS (default .) to rewrite templates
      in place. Pass EXTRA_ARGS for additional flags.
      Auto-installs djLint if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: >-
          bash -lc '{{.UV_LOAD}};
          djlint
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          --reformat
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}'
        platforms: [linux, darwin]
      - cmd: >-
          djlint
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          --reformat
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        platforms: [windows]

  fmt:check:
    run: once
    desc: Check HTML template formatting with djLint (TARGETS=path)
    summary: |
      Run djlint --check against TARGETS (default .) to report the formatting
      changes --reformat would make, without modifying files. Exits non-zero
      when files would change, making it suitable for CI.
      Auto-installs djLint if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: >-
          bash -lc '{{.UV_LOAD}};
          djlint
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          --check
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
          && echo "✅ djlint formatting check passed" || { echo "❌ djlint formatting check failed"; exit 1; }'
        platforms: [linux, darwin]
      - cmd: >-
          djlint
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          --check
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        platforms: [windows]

  _install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        bash -lc '{{.UV_LOAD}}; command -v djlint >/dev/null 2>&1
        && { [ -z "{{.DJLINT_VERSION}}" ] || djlint --version | grep -Fq "{{.DJLINT_VERSION}}"; }'
    deps:
      - uv:install
    cmds:
      - echo 'Installing djLint via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "djlint{{if .DJLINT_VERSION}}=={{.DJLINT_VERSION}}{{end}}"'
      - echo 'djLint installed.'

  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$djlint = Get-Command djlint -ErrorAction SilentlyContinue;
        if (-not $djlint) { exit 1 };
        $requested = '{{.DJLINT_VERSION}}';
        if ([string]::IsNullOrWhiteSpace($requested)
        -or ((& $djlint.Source --version) -like ('*' + $requested + '*'))) { exit 0 };
        exit 1"
    deps:
      - uv:install
    cmds:
      - echo Installing djLint via uv...
      - uv tool install --force "djlint{{if .DJLINT_VERSION}}=={{.DJLINT_VERSION}}{{end}}"
      - echo djLint installed.

  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - bash -lc '{{.UV_LOAD}}; ! command -v djlint >/dev/null 2>&1'
    cmds:
      - echo 'Removing djLint...'
      - bash -lc '{{.UV_LOAD}}; uv tool uninstall djlint'
      - echo 'djLint removed.'

  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command djlint -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing djLint via uv...
      - uv tool uninstall djlint
      - echo djLint removed.

  _upgrade:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: bash -lc '{{.UV_LOAD}}; command -v djlint >/dev/null 2>&1'
        msg: djLint is not installed. Run task install first.
    cmds:
      - echo 'Upgrading djLint via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "djlint{{if .DJLINT_VERSION}}=={{.DJLINT_VERSION}}{{end}}"'
      - echo 'djLint upgraded.'

  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command djlint -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: djLint is not installed. Run task install first.
    cmds:
      - echo Upgrading djLint via uv...
      - uv tool install --force "djlint{{if .DJLINT_VERSION}}=={{.DJLINT_VERSION}}{{end}}"
      - echo djLint upgraded.
