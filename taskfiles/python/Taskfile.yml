---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  uv:
    taskfile: ../uv/Taskfile.yml

vars:
  UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
  PYTHON_PIN_VERSION: "3.13"
  VENV: ".venv"
  REQUIREMENTS: "requirements.txt"
  FILE: ""
  ARGS: ""
  EXTRA_ARGS: ""

tasks:
  default:
    run: once
    desc: Show available Python automation tasks
    summary: Display the list of available Python-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    run: once
    desc: Install Python on the current operating system via uv
    summary: |
      Install Python (PYTHON_PIN_VERSION, default 3.13) via uv python install
      --default, which exposes it as python3/python on PATH through uv's
      shim directory. Auto-installs uv first if missing.
    deps:
      - uv:install
    cmds:
      - task: _install:unix
      - task: _install:windows

  install:undo:
    run: once
    desc: Remove the uv-managed Python from the current operating system
    summary: |
      Remove the Python version installed by this Taskfile via
      uv python uninstall. Other Python installations on the system, if any,
      are left untouched.
    aliases:
      - uninstall
    prompt:
      - This will remove the uv-managed Python from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows

  upgrade:
    run: once
    desc: Upgrade Python to the latest patch of PYTHON_PIN_VERSION
    summary: |
      Reinstall PYTHON_PIN_VERSION via uv python install --reinstall to pick up
      the latest available patch release. Auto-installs Python if missing.
    deps:
      - install
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows

  version:
    run: once
    desc: Show the installed Python version
    summary: Print the active Python version. Auto-installs Python if missing.
    deps:
      - install
    cmds:
      - task: _version:unix
      - task: _version:windows

  verify:
    run: once
    desc: Verify the Python installation and pip availability
    summary: |
      Print the active Python and pip versions to confirm both are installed
      and reachable. Useful for diagnosing setup issues after install.
      Auto-installs Python if missing.
    deps:
      - install
    cmds:
      - task: _verify:unix
      - task: _verify:windows

  venv:
    run: once
    desc: Create a Python virtual environment (VENV=path)
    summary: |
      Create a virtual environment at the path given by VENV (default .venv)
      using the python3 -m venv module. Run pip:install afterward to install
      project dependencies into the new environment.
    cmds:
      - task: _venv:unix
      - task: _venv:windows

  pip:install:
    run: once
    desc: Install packages from a requirements file (REQUIREMENTS=path)
    summary: |
      Run pip3 install -r REQUIREMENTS (default requirements.txt).
      Pass EXTRA_ARGS to forward additional flags such as --upgrade or
      --no-cache-dir. Does not require an active virtual environment.
    cmds:
      - task: _pip:install:unix
      - task: _pip:install:windows

  run:
    run: once
    desc: Run a Python script (FILE=path)
    summary: |
      Execute FILE with python3 (Unix) or python (Windows).
      Pass ARGS to forward positional arguments to the script and
      EXTRA_ARGS for interpreter flags such as -u or -m.
    requires:
      vars:
        - FILE
    preconditions:
      - sh: test -n "{{.FILE_OVERRIDE}}{{.FILE}}"
        msg: FILE is required. Pass FILE=path/to/script.py when running this task.
    cmds:
      - task: _run:unix
      - task: _run:windows

  _install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - 'test -f "$HOME/.local/bin/python3" || command -v python3 >/dev/null 2>&1'
    cmds:
      - echo 'Installing Python via uv...'
      - bash -lc '{{.UV_LOAD}}; uv python install {{.PYTHON_PIN_VERSION}} --default'
      - echo 'Python installed.'

  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command python -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    cmds:
      - echo Installing Python via uv...
      - uv python install {{.PYTHON_PIN_VERSION}} --default
      - echo Python installed. Restart your terminal to use python.

  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '! test -f "$HOME/.local/bin/python3" && ! command -v python3 >/dev/null 2>&1'
    cmds:
      - echo 'Removing Python via uv...'
      - bash -lc '{{.UV_LOAD}}; uv python uninstall {{.PYTHON_PIN_VERSION}}'
      - echo 'Python removed.'

  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command python -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing Python via uv...
      - uv python uninstall {{.PYTHON_PIN_VERSION}}
      - echo Python removed.

  _upgrade:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    cmds:
      - echo 'Upgrading Python via uv...'
      - bash -lc '{{.UV_LOAD}}; uv python install {{.PYTHON_PIN_VERSION}} --default --reinstall'
      - echo 'Python upgraded.'

  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    cmds:
      - echo Upgrading Python via uv...
      - uv python install {{.PYTHON_PIN_VERSION}} --default --reinstall
      - echo Python upgraded.

  _version:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: 'test -f "$HOME/.local/bin/python3" || command -v python3 >/dev/null 2>&1'
        msg: Python is not installed or not available in PATH.
    cmds:
      - bash -lc '{{.UV_LOAD}}; python3 --version'

  _version:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command python -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Python is not installed or not available in PATH.
    cmds:
      - python --version

  _verify:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: 'test -f "$HOME/.local/bin/python3" || command -v python3 >/dev/null 2>&1'
        msg: Python is not installed or not available in PATH.
    cmds:
      - bash -lc '{{.UV_LOAD}}; python3 --version'
      - bash -lc '{{.UV_LOAD}}; pip3 --version'

  _verify:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command python -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Python is not installed or not available in PATH.
    cmds:
      - python --version
      - pip --version

  _venv:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: 'test -f "$HOME/.local/bin/python3" || command -v python3 >/dev/null 2>&1'
        msg: Python is not installed. Run task install first.
    cmds:
      - echo 'Creating virtual environment at {{.VENV}}...'
      - bash -lc '{{.UV_LOAD}}; python3 -m venv "{{.VENV}}"'
      - echo 'Virtual environment ready.'

  _venv:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command python -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Python is not installed. Run task install first.
    cmds:
      - echo Creating virtual environment at {{.VENV}}...
      - python -m venv "{{.VENV}}"
      - echo Virtual environment ready.

  _pip:install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: 'test -f "$HOME/.local/bin/pip3" || command -v pip3 >/dev/null 2>&1'
        msg: pip3 is not available. Run task install first.
    cmds:
      - bash -lc '{{.UV_LOAD}}; pip3 install -r "{{.REQUIREMENTS}}" {{.EXTRA_ARGS}}'

  _pip:install:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command pip -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: pip is not available. Run task install first.
    cmds:
      - pip install -r "{{.REQUIREMENTS}}" {{.EXTRA_ARGS}}

  _run:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: 'test -f "$HOME/.local/bin/python3" || command -v python3 >/dev/null 2>&1'
        msg: Python is not installed. Run task install first.
    cmds:
      - >-
        bash -lc '{{.UV_LOAD}};
        python3 "{{if .FILE_OVERRIDE}}{{.FILE_OVERRIDE}}{{else}}{{.FILE}}{{end}}"
        {{.ARGS}}
        {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}'

  _run:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command python -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: Python is not installed. Run task install first.
    cmds:
      - >-
        python "{{if .FILE_OVERRIDE}}{{.FILE_OVERRIDE}}{{else}}{{.FILE}}{{end}}"
        {{.ARGS}}
        {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
