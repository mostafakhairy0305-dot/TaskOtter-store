---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  yarn:
    taskfile: ../yarn-fnm/Taskfile.yml

vars:
  TARGETS: ""
  PRETTIER_DEFAULT_TARGETS: "."
  CONFIG: ""
  IGNORE_PATH: ""
  PRETTIER_DEFAULT_IGNORE_PATH: ".prettierignore"
  EXTRA_ARGS: ""
  VERSION: ""

tasks:
  default:
    run: once
    desc: Show available Prettier tasks
    cmds:
      - task --list

  install:
    run: once
    desc: Install Prettier as a local devDependency
    summary: |
      Install prettier as a local devDependency. Pass VERSION=x.y.z to pin a
      specific release instead of the package manager's default resolution.
    cmds:
      - task: yarn:add
        vars:
          PACKAGES: >-
            prettier{{if .VERSION_OVERRIDE}}@{{.VERSION_OVERRIDE}}
            {{- else if .VERSION}}@{{.VERSION}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  install:undo:
    run: once
    desc: Remove the locally installed Prettier devDependency
    summary: Remove prettier from local devDependencies via the active package manager.
    aliases:
      - uninstall
    prompt:
      - This will remove prettier from local devDependencies.
      - Continue?
    cmds:
      - task: yarn:remove
        vars:
          PACKAGES: prettier
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  upgrade:
    run: once
    desc: Upgrade Prettier to the latest release
    summary: Reinstall prettier at the latest version as a local devDependency.
    cmds:
      - task: yarn:add
        vars:
          PACKAGES: prettier@latest
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  config:init:
    run: once
    desc: Create a starter Prettier config when none exists
    vars:
      PRETTIER_CONFIG_PATH: >-
        {{if .CONFIG_OVERRIDE}}{{.CONFIG_OVERRIDE}}
        {{- else}}{{if .CONFIG}}{{.CONFIG}}
        {{- else}}.prettierrc.json{{end}}{{end}}
    status:
      - test -f "{{.PRETTIER_CONFIG_PATH}}"
    cmds:
      - "printf '{\\n' > \"{{.PRETTIER_CONFIG_PATH}}\""
      - "printf '  \"singleQuote\": true,\\n' >> \"{{.PRETTIER_CONFIG_PATH}}\""
      - "printf '  \"semi\": true\\n' >> \"{{.PRETTIER_CONFIG_PATH}}\""
      - "printf '}\\n' >> \"{{.PRETTIER_CONFIG_PATH}}\""
      - echo 'Created {{.PRETTIER_CONFIG_PATH}}.'

  fmt:check:
    run: once
    desc: Check formatting with Prettier
    cmds:
      - task: _exec:ignore
        vars:
          BINARY: prettier
          ARGS: >-
            {{if .PRETTIER_TARGETS_OVERRIDE}}{{.PRETTIER_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.PRETTIER_DEFAULT_TARGETS}}{{end}}{{end}}
            --check
            {{if .CONFIG_OVERRIDE}}--config "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config "{{.CONFIG}}" {{end}}{{end}}
          IGNORE_PATH: >-
            {{if .IGNORE_PATH_OVERRIDE}}{{.IGNORE_PATH_OVERRIDE}}
            {{- else}}{{if .IGNORE_PATH}}{{.IGNORE_PATH}}
            {{- else}}{{.PRETTIER_DEFAULT_IGNORE_PATH}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ prettier passed"

  fmt:
    run: once
    desc: Format files with Prettier
    cmds:
      - task: _exec:ignore
        vars:
          BINARY: prettier
          ARGS: >-
            {{if .PRETTIER_TARGETS_OVERRIDE}}{{.PRETTIER_TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}{{.PRETTIER_DEFAULT_TARGETS}}{{end}}{{end}}
            --write
            {{if .CONFIG_OVERRIDE}}--config "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config "{{.CONFIG}}" {{end}}{{end}}
          IGNORE_PATH: >-
            {{if .IGNORE_PATH_OVERRIDE}}{{.IGNORE_PATH_OVERRIDE}}
            {{- else}}{{if .IGNORE_PATH}}{{.IGNORE_PATH}}
            {{- else}}{{.PRETTIER_DEFAULT_IGNORE_PATH}}{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{else}}{{if .EXTRA_ARGS}}{{.EXTRA_ARGS}}{{end}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ prettier fixes applied"

  fix:
    run: once
    desc: Alias for prettier:fmt
    cmds:
      - task: fmt

  ci:
    run: once
    desc: Alias for prettier:fmt:check
    cmds:
      - task: fmt:check

  version:
    run: once
    desc: Show the locally resolved Prettier version
    cmds:
      - task: yarn:exec
        vars:
          BINARY: prettier
          ARGS: "--version"

  help:
    run: once
    desc: Show Prettier CLI help
    cmds:
      - task: yarn:exec
        vars:
          BINARY: prettier
          ARGS: "--help"
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  _exec:ignore:
    run: once
    internal: true
    desc: Execute a local project binary and include an ignore file when present
    requires:
      vars: [BINARY]
    vars:
      IGNORE_FLAG: "--ignore-path"
      _IGNORE_ARGS:
        sh: |
          if [ -n "{{.IGNORE_PATH}}" ] && [ -f "{{.IGNORE_PATH}}" ]; then
            echo "{{.IGNORE_FLAG}} {{.IGNORE_PATH}}"
          fi
    cmds:
      - task: yarn:exec
        vars:
          BINARY: "{{.BINARY}}"
          ARGS: "{{.ARGS}} {{._IGNORE_ARGS}}"
          EXTRA_ARGS: "{{.EXTRA_ARGS}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}"
