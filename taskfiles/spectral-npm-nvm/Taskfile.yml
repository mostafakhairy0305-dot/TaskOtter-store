---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  npm:
    taskfile: ../npm-nvm/Taskfile.yml

vars:
  SPECTRAL_LINT_SKIP_PATTERN: ""
  TARGETS: ""
  RULESET: ""
  EXTRA_ARGS: ""
  VERSION: ""

tasks:
  default:
    run: once
    desc: Show available Spectral tasks
    cmds:
      - task --list

  install:
    run: once
    desc: Install Spectral as a local devDependency
    summary: |
      Install @stoplight/spectral-cli as a local devDependency. Pass
      VERSION=x.y.z to pin a specific release instead of the package
      manager's default resolution.
    status:
      - >-
        node -e "const installed = require('./node_modules/@stoplight/spectral-cli/package.json');
        const requested = '{{if .VERSION_OVERRIDE}}{{.VERSION_OVERRIDE}}{{else}}{{.VERSION}}{{end}}';
        process.exit(!requested || installed.version === requested ? 0 : 1)"
    cmds:
      - task: npm:add
        vars:
          PACKAGES: >-
            @stoplight/spectral-cli{{if .VERSION_OVERRIDE}}@{{.VERSION_OVERRIDE}}
            {{- else if .VERSION}}@{{.VERSION}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  install:undo:
    run: once
    desc: Remove the locally installed Spectral devDependency
    summary: Remove @stoplight/spectral-cli from local devDependencies via the active package manager.
    aliases:
      - uninstall
    prompt:
      - This will remove @stoplight/spectral-cli from local devDependencies.
      - Continue?
    cmds:
      - task: npm:remove
        vars:
          PACKAGES: "@stoplight/spectral-cli"
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  upgrade:
    run: once
    desc: Upgrade Spectral to the latest release
    summary: Reinstall @stoplight/spectral-cli at the latest version as a local devDependency.
    cmds:
      - task: npm:add
        vars:
          PACKAGES: "@stoplight/spectral-cli@latest"
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  config:init:
    run: once
    desc: Create a default .spectral.yaml ruleset file
    summary: |
      Write a .spectral.yaml ruleset extending the built-in spectral:oas
      OpenAPI rules in the current directory. Skipped if .spectral.yaml
      already exists.
    dir: "{{.USER_WORKING_DIR}}"
    status:
      - test -f .spectral.yaml
    cmds:
      - 'printf ''extends: ["spectral:oas"]\n'' > .spectral.yaml'
      - echo 'Created .spectral.yaml extending spectral:oas.'

  lint:
    run: once
    desc: Lint API documents with Spectral (TARGETS=path)
    summary: |
      Run spectral lint against the API documents at TARGETS. Pass RULESET to
      use a specific ruleset file via --ruleset, and EXTRA_ARGS for additional
      flags. Auto-installs Spectral if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - task: npm:exec
        vars:
          BINARY: spectral
          ARGS: >-
            lint
            {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else}}{{.TARGETS}}{{end}}
            {{if .SPECTRAL_LINT_SKIP_PATTERN_OVERRIDE}}"!{{.SPECTRAL_LINT_SKIP_PATTERN_OVERRIDE}}"
            {{else if .SPECTRAL_LINT_SKIP_PATTERN}}"!{{.SPECTRAL_LINT_SKIP_PATTERN}}" {{end}}
            {{if .RULESET_OVERRIDE}}--ruleset "{{.RULESET_OVERRIDE}}"
            {{else}}{{if .RULESET}}--ruleset "{{.RULESET}}"{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ spectral passed"

  help:
    run: once
    desc: Show the Spectral CLI help
    deps:
      - install
    cmds:
      - task: npm:exec
        vars:
          BINARY: spectral
          ARGS: "--help"

  version:
    run: once
    desc: Show the locally resolved Spectral version
    deps:
      - install
    cmds:
      - task: npm:exec
        vars:
          BINARY: spectral
          ARGS: "--version"
