---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  uv:
    taskfile: ../uv/Taskfile.yml

vars:
  RUMDL_LINT_SKIP_PATTERN: ""
  RUMDL_FMT_SKIP_PATTERN: ""
  UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
  TARGETS: "."
  EXTRA_ARGS: ""
  RUMDL_VERSION: ""

tasks:
  default:
    run: once
    desc: Show available rumdl automation tasks
    summary: Display the list of available rumdl-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    run: once
    desc: Install rumdl on the current operating system
    summary: |
      Install rumdl via uv tool install for the current platform.
      Pass RUMDL_VERSION to pin a specific release instead of the latest.
      uv manages an isolated environment so rumdl never conflicts with
      project dependencies. Installs uv first if it is not already present.
    cmds:
      - task: _install:unix
      - task: _install:windows

  install:undo:
    run: once
    desc: Remove rumdl from the current operating system
    summary: |
      Remove rumdl via uv tool uninstall on all platforms.
      The uv-managed isolated environment is cleaned up automatically.
    aliases:
      - uninstall
    prompt:
      - This will remove rumdl from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows

  upgrade:
    run: once
    desc: Upgrade rumdl to the latest release
    summary: |
      Upgrade rumdl by reinstalling it via uv on all platforms.
      Honors RUMDL_VERSION when set.
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows

  version:
    run: once
    desc: Show the installed rumdl version
    summary: Print the active rumdl version via rumdl --version. Auto-installs rumdl if missing.
    deps:
      - install
    cmds:
      - cmd: bash -lc '{{.UV_LOAD}}; rumdl --version'
        platforms: [linux, darwin]
      - cmd: rumdl --version
        platforms: [windows]

  lint:
    run: once
    desc: Lint Markdown files with rumdl (TARGETS=path)
    summary: |
      Run rumdl check against TARGETS (default .). Pass EXTRA_ARGS for
      additional flags. Auto-installs rumdl if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: >-
          bash -lc '{{.UV_LOAD}};
          rumdl check
          {{if .RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}"
          {{else if .RUMDL_LINT_SKIP_PATTERN}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN}}" {{end}}
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
          && echo "✅ rumdl passed" || { echo "❌ rumdl failed"; exit 1; }'
        platforms: [linux, darwin]
      - cmd: >-
          rumdl check
          {{if .RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}"
          {{else if .RUMDL_LINT_SKIP_PATTERN}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN}}" {{end}}
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        platforms: [windows]

  fix:
    run: once
    desc: Fix Markdown lint issues with rumdl (TARGETS=path)
    summary: |
      Run rumdl check --fix against TARGETS (default .) to apply automatic
      fixes for fixable lint violations. Exits non-zero when unfixable
      violations remain. Pass EXTRA_ARGS for additional flags.
      Auto-installs rumdl if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: >-
          bash -lc '{{.UV_LOAD}};
          rumdl check --fix
          {{if .RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}"
          {{else if .RUMDL_LINT_SKIP_PATTERN}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN}}" {{end}}
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}'
        platforms: [linux, darwin]
      - cmd: >-
          rumdl check --fix
          {{if .RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN_OVERRIDE}}"
          {{else if .RUMDL_LINT_SKIP_PATTERN}}--exclude "{{.RUMDL_LINT_SKIP_PATTERN}}" {{end}}
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        platforms: [windows]

  fmt:
    run: once
    desc: Format Markdown files with rumdl (TARGETS=path)
    summary: |
      Run rumdl fmt against TARGETS (default .). Unlike fix, fmt uses
      formatter-style exit codes and exits zero after successful formatting
      even if unfixable violations remain. Pass EXTRA_ARGS for additional
      flags. Auto-installs rumdl if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - cmd: >-
          bash -lc '{{.UV_LOAD}};
          rumdl fmt
          {{if .RUMDL_FMT_SKIP_PATTERN_OVERRIDE}}--exclude "{{.RUMDL_FMT_SKIP_PATTERN_OVERRIDE}}"
          {{else if .RUMDL_FMT_SKIP_PATTERN}}--exclude "{{.RUMDL_FMT_SKIP_PATTERN}}" {{end}}
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}'
        platforms: [linux, darwin]
      - cmd: >-
          rumdl fmt
          {{if .RUMDL_FMT_SKIP_PATTERN_OVERRIDE}}--exclude "{{.RUMDL_FMT_SKIP_PATTERN_OVERRIDE}}"
          {{else if .RUMDL_FMT_SKIP_PATTERN}}--exclude "{{.RUMDL_FMT_SKIP_PATTERN}}" {{end}}
          {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
          {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        platforms: [windows]

  _install:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - >-
        bash -lc '{{.UV_LOAD}}; command -v rumdl >/dev/null 2>&1
        && { [ -z "{{.RUMDL_VERSION}}" ] || rumdl --version | grep -Fq "{{.RUMDL_VERSION}}"; }'
    deps:
      - uv:install
    cmds:
      - echo 'Installing rumdl via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "rumdl{{if .RUMDL_VERSION}}=={{.RUMDL_VERSION}}{{end}}"'
      - echo 'rumdl installed.'

  _install:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$rumdl = Get-Command rumdl -ErrorAction SilentlyContinue;
        if (-not $rumdl) { exit 1 };
        $requested = '{{.RUMDL_VERSION}}';
        if ([string]::IsNullOrWhiteSpace($requested)
        -or ((& $rumdl.Source --version) -like ('*' + $requested + '*'))) { exit 0 };
        exit 1"
    deps:
      - uv:install
    cmds:
      - echo Installing rumdl via uv...
      - uv tool install --force "rumdl{{if .RUMDL_VERSION}}=={{.RUMDL_VERSION}}{{end}}"
      - echo rumdl installed.

  _install:undo:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - bash -lc '{{.UV_LOAD}}; ! command -v rumdl >/dev/null 2>&1'
    cmds:
      - echo 'Removing rumdl...'
      - bash -lc '{{.UV_LOAD}}; uv tool uninstall rumdl'
      - echo 'rumdl removed.'

  _install:undo:windows:
    run: once
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command rumdl -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing rumdl via uv...
      - uv tool uninstall rumdl
      - echo rumdl removed.

  _upgrade:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: bash -lc '{{.UV_LOAD}}; command -v rumdl >/dev/null 2>&1'
        msg: rumdl is not installed. Run task install first.
    cmds:
      - echo 'Upgrading rumdl via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "rumdl{{if .RUMDL_VERSION}}=={{.RUMDL_VERSION}}{{end}}"'
      - echo 'rumdl upgraded.'

  _upgrade:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command rumdl -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: rumdl is not installed. Run task install first.
    cmds:
      - echo Upgrading rumdl via uv...
      - uv tool install --force "rumdl{{if .RUMDL_VERSION}}=={{.RUMDL_VERSION}}{{end}}"
      - echo rumdl upgraded.
