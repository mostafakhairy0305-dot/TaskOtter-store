---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  corepack:
    taskfile: ../corepack-nvm/Taskfile.yml
  nvm:
    taskfile: ../nvm/Taskfile.yml

vars:
  NVM_LOAD: 'export NVM_DIR="$HOME/.nvm"; . "$NVM_DIR/nvm.sh"'
  NVM_USE: >-
    {{if .NODE_VERSION}}nvm use "{{.NODE_VERSION}}"
    {{- else}}if [ -f .node-version ] || [ -f .nvmrc ]; then nvm use; fi{{end}}
  NODE_VERSION: ""
  WINDOWS_NODE_ACTIVATE: |
    if ($env:NODE_VERSION) {
      nvm use $env:NODE_VERSION
    } elseif (Test-Path '.node-version') {
      $v = (Get-Content '.node-version' -Raw).Trim()
      if ($v) { nvm use $v }
    } elseif (Test-Path '.nvmrc') {
      $v = (Get-Content '.nvmrc' -Raw).Trim()
      if ($v) { nvm use $v }
    }

tasks:
  default:
    run: once
    desc: Show available Yarn automation tasks
    summary: Display the list of available Yarn-related tasks defined in this Taskfile.
    cmds:
      - task --list

  node:setup:
    run: once
    desc: Install Node.js using the selected node manager
    summary: |
      Install Node.js through the node manager selected by nvm.
      Pass NODE_VERSION to target a
      specific Node.js release; defaults to LTS when omitted.
    cmds:
      - task: _node:setup:unix
      - task: _node:setup:windows

  manager:setup:
    run: once
    desc: Enable Corepack for Yarn commands
    summary: Ensure Corepack is installed and enable its package manager shims for Yarn projects.
    cmds:
      - task: corepack:setup

  manager:pin:
    run: once
    desc: Pin Yarn in package.json with Corepack
    summary: Use Corepack to write yarn@PACKAGE_MANAGER_VERSION to the current project's packageManager field.
    requires:
      vars: [PACKAGE_MANAGER_VERSION]
    cmds:
      - task: corepack:use
        vars:
          PACKAGE_MANAGER: yarn
          VERSION: "{{.PACKAGE_MANAGER_VERSION}}"

  version:
    run: once
    desc: Show the active Node.js and Yarn versions
    summary: Print the Node.js and Yarn versions after loading the selected Node.js runtime.
    cmds:
      - task: _version:unix
      - task: _version:windows

  install:
    run: once
    desc: Install project dependencies with yarn install
    summary: Install dependencies from package.json using the Yarn version available to the project.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: install }
      - task: _yarn:windows
        vars: { ARGS: install }

  ci:
    run: once
    desc: Validate a lockfile-safe Yarn install
    summary: Run yarn install --immutable and fail if Yarn would modify yarn.lock.
    cmds:
      - task: _ci:unix
      - task: _ci:windows

  add:
    run: once
    desc: Install packages globally with Yarn (PACKAGES=<pkgs>)
    requires:
      vars: [PACKAGES]
    cmds:
      - task: _yarn:unix
        vars:
          ARGS: "global add {{.PACKAGES}} {{.EXTRA_ARGS}}"
      - task: _yarn:windows
        vars:
          ARGS: "global add {{.PACKAGES}} {{.EXTRA_ARGS}}"

  remove:
    run: once
    desc: Remove globally-installed packages with Yarn (PACKAGES=<pkgs>)
    requires:
      vars: [PACKAGES]
    cmds:
      - task: _yarn:unix
        vars:
          ARGS: "global remove {{.PACKAGES}} {{.EXTRA_ARGS}}"
      - task: _yarn:windows
        vars:
          ARGS: "global remove {{.PACKAGES}} {{.EXTRA_ARGS}}"

  install:undo:
    run: once
    desc: Disable the Yarn Corepack shim
    summary: |
      Run corepack disable yarn to remove the Corepack-managed Yarn shim
      from the active Node.js runtime.
    aliases:
      - uninstall
    prompt:
      - This will disable the Yarn shim provided by Corepack.
      - Continue?
    cmds:
      - task: corepack:_corepack:unix
        vars: { ARGS: "disable yarn" }
      - task: corepack:_corepack:windows
        vars: { ARGS: "disable yarn" }

  upgrade:
    run: once
    desc: Upgrade Yarn to the latest release
    summary: |
      Run corepack prepare yarn@latest --activate to upgrade the
      Corepack-managed Yarn shim to the latest release.
    cmds:
      - task: corepack:_corepack:unix
        vars: { ARGS: "prepare yarn@latest --activate" }
      - task: corepack:_corepack:windows
        vars: { ARGS: "prepare yarn@latest --activate" }

  exec:
    run: once
    desc: Execute a global binary via Yarn (BINARY=<name>)
    requires:
      vars: [BINARY]
    cmds:
      - task: _exec:unix
        vars:
          BINARY: "{{.BINARY}}"
          ARGS: "{{.ARGS}}"
          EXTRA_ARGS: "{{.EXTRA_ARGS}}"
      - task: _exec:windows
        vars:
          BINARY: "{{.BINARY}}"
          ARGS: "{{.ARGS}}"
          EXTRA_ARGS: "{{.EXTRA_ARGS}}"

  run:
    run: once
    desc: Run a package.json script with Yarn
    summary: Run SCRIPT through yarn run and forward arguments passed after -- to that script.
    requires:
      vars: [SCRIPT]
    cmds:
      - task: _run:unix
        vars:
          SCRIPT: "{{.SCRIPT}}"
          CLI_ARGS: "{{.CLI_ARGS}}"
      - task: _run:windows
        vars:
          SCRIPT: "{{.SCRIPT}}"
          CLI_ARGS: "{{.CLI_ARGS}}"

  dev:
    run: once
    desc: Start the development script with Yarn
    summary: Execute the dev script defined in package.json through yarn run dev.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: run dev }
      - task: _yarn:windows
        vars: { ARGS: run dev }

  test:
    run: once
    desc: Run the project test script with Yarn
    summary: Execute the test script defined in package.json through yarn test.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: test }
      - task: _yarn:windows
        vars: { ARGS: test }

  build:
    run: once
    desc: Build the project with Yarn
    summary: Execute the build script defined in package.json through yarn run build.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: run build }
      - task: _yarn:windows
        vars: { ARGS: run build }

  lint:
    run: once
    desc: Lint the project with Yarn
    summary: Execute the lint script defined in package.json through yarn run lint.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: run lint }
      - task: _yarn:windows
        vars: { ARGS: run lint }

  format:
    run: once
    desc: Format source files with Yarn
    summary: Execute the format script defined in package.json through yarn run format.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: run format }
      - task: _yarn:windows
        vars: { ARGS: run format }

  typecheck:
    run: once
    desc: Type check the project with Yarn
    summary: Execute the typecheck script defined in package.json through yarn run typecheck.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: run typecheck }
      - task: _yarn:windows
        vars: { ARGS: run typecheck }

  update:
    run: once
    desc: Update dependencies with yarn up
    summary: Run yarn up against all dependency patterns to update project resolutions with modern Yarn.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: "up '*'" }
      - task: _yarn:windows
        vars: { ARGS: "up '*'" }

  audit:
    run: once
    desc: Run a Yarn vulnerability audit
    summary: Run yarn npm audit and propagate vulnerability findings for CI enforcement.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: npm audit }
      - task: _yarn:windows
        vars: { ARGS: npm audit }

  audit:report:
    run: once
    desc: Report Yarn audit findings without failing
    summary: Run yarn npm audit for local review while ignoring its vulnerability exit code.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: npm audit }
        ignore_error: true
      - task: _yarn:windows
        vars: { ARGS: npm audit }
        ignore_error: true

  audit:json:
    run: once
    desc: Output Yarn audit findings as JSON
    summary: Run yarn npm audit --json for tooling and propagate the Yarn audit exit code.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: npm audit --json }
      - task: _yarn:windows
        vars: { ARGS: npm audit --json }

  cache:clean:
    run: once
    desc: Clear the Yarn cache
    summary: Run yarn cache clean to remove Yarn cache entries available to the active project.
    cmds:
      - task: _yarn:unix
        vars: { ARGS: cache clean }
      - task: _yarn:windows
        vars: { ARGS: cache clean }

  clean:
    run: once
    desc: Remove the node_modules directory
    summary: Delete node_modules when the project uses a node_modules Yarn linker.
    prompt:
      - This will delete the node_modules directory.
      - Continue?
    cmds:
      - task: _clean:unix
      - task: _clean:windows

  clean:all:
    run: once
    desc: Remove node_modules and yarn.lock
    summary: Delete node_modules and yarn.lock so a later Yarn install regenerates the lockfile.
    prompt:
      - "WARNING: This will permanently delete node_modules AND yarn.lock."
      - Continue?
    cmds:
      - task: _clean:all:unix
      - task: _clean:all:windows

  _node:setup:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    env:
      NODE_VERSION: "{{.NODE_VERSION}}"
    preconditions:
      - sh: 'task --list-all 2>/dev/null | grep -q "nvm:node:install"'
        msg: >-
          node:setup requires the nvm taskfile included in the root Taskfile.
          Add: nvm: taskfile: taskfiles/nvm/Taskfile.yml
    cmds:
      - |
        if [ -n "$NODE_VERSION" ]; then
          task nvm:node:install VERSION="$NODE_VERSION"
        else
          task nvm:node:install
        fi

  _node:setup:windows:
    run: once
    internal: true
    platforms: [windows]
    env:
      NODE_VERSION: "{{.NODE_VERSION}}"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if ((task --list-all 2>$null | Out-String) -match 'nvm:node:install')
          { exit 0 } else { exit 1 }"
        msg: >-
          node:setup requires the nvm taskfile included in the root Taskfile.
          Add: nvm: taskfile: taskfiles/nvm/Taskfile.yml
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if ($env:NODE_VERSION) { task nvm:node:install \"VERSION=$env:NODE_VERSION\" }
        else { task nvm:node:install }""

  _yarn:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    dir: "{{.USER_WORKING_DIR}}"
    set: [errexit, nounset, pipefail]
    requires:
      vars: [ARGS]
    env:
      COREPACK_ENABLE_AUTO_PIN: "1"
    preconditions:
      - sh: test -s "$HOME/.nvm/nvm.sh"
        msg: 'nvm is not installed. Run: task node:setup'
      - sh: 'test -f "{{.USER_WORKING_DIR}}/package.json"'
        msg: "package.json not found. Run this task from the Yarn project root."
    cmds:
      - >-
        bash -c '{{.NVM_LOAD}}; {{.NVM_USE}};
        command -v corepack >/dev/null 2>&1 ||
        { echo "corepack is not available. Run: task manager:setup"; exit 1; };
        corepack yarn {{.ARGS}}'

  _yarn:windows:
    run: once
    internal: true
    platforms: [windows]
    dir: "{{.USER_WORKING_DIR}}"
    requires:
      vars: [ARGS]
    env:
      NODE_VERSION: "{{.NODE_VERSION}}"
      COREPACK_ENABLE_AUTO_PIN: "1"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command nvm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: 'nvm is not installed or not available in PATH. Run: task node:setup'
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Test-Path '{{.USER_WORKING_DIR}}\package.json') { exit 0 } else { exit 1 }"
        msg: "package.json not found. Run this task from the Yarn project root."
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$ErrorActionPreference = 'Stop';
        $env:NODE_VERSION = '{{.NODE_VERSION}}';
        {{.WINDOWS_NODE_ACTIVATE}};
        if (-not (Get-Command corepack -ErrorAction SilentlyContinue)) {
        Write-Error 'corepack is not available. Run: task manager:setup'; exit 1 };
        corepack yarn {{.ARGS}}"

  _ci:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    preconditions:
      - sh: 'test -f "{{.USER_WORKING_DIR}}/yarn.lock"'
        msg: "yarn.lock not found. Yarn CI installs require a lockfile."
    cmds:
      - task: _yarn:unix
        vars: { ARGS: install --immutable }

  _ci:windows:
    run: once
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Test-Path '{{.USER_WORKING_DIR}}\yarn.lock') { exit 0 } else { exit 1 }"
        msg: "yarn.lock not found. Yarn CI installs require a lockfile."
    cmds:
      - task: _yarn:windows
        vars: { ARGS: install --immutable }

  _run:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    env:
      SCRIPT: "{{.SCRIPT}}"
    preconditions:
      - sh: 'printf "%s" "$SCRIPT" | grep -qE "^[A-Za-z0-9:_-]+$"'
        msg: 'SCRIPT "{{.SCRIPT}}" contains invalid characters.'
    cmds:
      - task: _yarn:unix
        vars:
          ARGS: "run {{.SCRIPT}}{{if .CLI_ARGS}} -- {{.CLI_ARGS}}{{end}}"

  _run:windows:
    run: once
    internal: true
    platforms: [windows]
    env:
      SCRIPT: "{{.SCRIPT}}"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if ($env:SCRIPT -match '^[A-Za-z0-9:_-]+$') { exit 0 } else { exit 1 }"
        msg: 'SCRIPT "{{.SCRIPT}}" contains invalid characters.'
    cmds:
      - task: _yarn:windows
        vars:
          ARGS: "run {{.SCRIPT}}{{if .CLI_ARGS}} -- {{.CLI_ARGS}}{{end}}"

  _version:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: test -s "$HOME/.nvm/nvm.sh"
        msg: 'nvm is not installed. Run: task node:setup'
    cmds:
      - >-
        bash -c '{{.NVM_LOAD}}; {{.NVM_USE}};
        command -v corepack >/dev/null 2>&1 ||
        { echo "corepack is not available. Run: task manager:setup"; exit 1; };
        node --version; corepack yarn --version'

  _version:windows:
    run: once
    internal: true
    platforms: [windows]
    env:
      NODE_VERSION: "{{.NODE_VERSION}}"
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command nvm -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: 'nvm is not installed or not available in PATH. Run: task node:setup'
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "$ErrorActionPreference = 'Stop';
        $env:NODE_VERSION = '{{.NODE_VERSION}}';
        {{.WINDOWS_NODE_ACTIVATE}};
        node --version; corepack yarn --version"

  _clean:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    dir: "{{.USER_WORKING_DIR}}"
    status: ["test ! -d node_modules"]
    cmds:
      - rm -rf node_modules

  _clean:windows:
    run: once
    internal: true
    platforms: [windows]
    dir: "{{.USER_WORKING_DIR}}"
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Test-Path 'node_modules') { exit 1 } else { exit 0 }"
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -Recurse -Force 'node_modules'"

  _exec:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    dir: "{{.USER_WORKING_DIR}}"
    set: [errexit, nounset, pipefail]
    requires:
      vars: [BINARY]
    cmds:
      - bash -c "{{.BINARY}} {{.ARGS}} {{.EXTRA_ARGS}}"

  _exec:windows:
    run: once
    internal: true
    platforms: [windows]
    dir: "{{.USER_WORKING_DIR}}"
    requires:
      vars: [BINARY]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "& {{.BINARY}} {{.ARGS}} {{.EXTRA_ARGS}}"

  _clean:all:unix:
    run: once
    internal: true
    platforms: [linux, darwin]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - rm -rf node_modules
      - rm -f yarn.lock

  _clean:all:windows:
    run: once
    internal: true
    platforms: [windows]
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Test-Path 'node_modules') { Remove-Item -Recurse -Force 'node_modules' };
        if (Test-Path 'yarn.lock') { Remove-Item -Force 'yarn.lock' }"
