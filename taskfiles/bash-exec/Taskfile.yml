---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

vars:
  ARGS: ""
  BASH_FLAGS: ""
  COMMAND: ""
  SCRIPT: ""

tasks:
  default:
    run: once
    desc: Show available Bash execution tasks
    summary: Display the list of Bash script execution tasks defined in this Taskfile.
    cmds:
      - task --list

  run:
    run: once
    desc: Run a Bash script (SCRIPT=path)
    summary: |
      Execute SCRIPT with Bash from the current working directory. Pass ARGS for
      positional script arguments and BASH_FLAGS for Bash options such as -euo
      pipefail. Bash must be installed and available in PATH.
    dir: "{{.USER_WORKING_DIR}}"
    preconditions:
      - sh: test -n "{{.SCRIPT_OVERRIDE}}{{.SCRIPT}}"
        msg: SCRIPT is required. Pass SCRIPT=path/to/script.sh when running this task.
      - sh: command -v bash >/dev/null 2>&1
        msg: Bash is required. Install Bash and ensure it is available in PATH.
    cmds:
      - >-
        bash
        {{if .BASH_FLAGS_OVERRIDE}}{{.BASH_FLAGS_OVERRIDE}}{{else}}{{.BASH_FLAGS}}{{end}}
        "{{if .SCRIPT_OVERRIDE}}{{.SCRIPT_OVERRIDE}}{{else}}{{.SCRIPT}}{{end}}"
        {{if .ARGS_OVERRIDE}}{{.ARGS_OVERRIDE}}{{else}}{{.ARGS}}{{end}}

  check:
    run: once
    desc: Check a Bash script for syntax errors (SCRIPT=path)
    summary: |
      Run Bash syntax validation for SCRIPT without executing it. Pass BASH_FLAGS
      for parser options such as --noprofile. Bash must be available in PATH.
    dir: "{{.USER_WORKING_DIR}}"
    preconditions:
      - sh: test -n "{{.SCRIPT_OVERRIDE}}{{.SCRIPT}}"
        msg: SCRIPT is required. Pass SCRIPT=path/to/script.sh when running this task.
      - sh: command -v bash >/dev/null 2>&1
        msg: Bash is required. Install Bash and ensure it is available in PATH.
    cmds:
      - >-
        bash -n
        {{if .BASH_FLAGS_OVERRIDE}}{{.BASH_FLAGS_OVERRIDE}}{{else}}{{.BASH_FLAGS}}{{end}}
        "{{if .SCRIPT_OVERRIDE}}{{.SCRIPT_OVERRIDE}}{{else}}{{.SCRIPT}}{{end}}"

  exec:
    run: once
    desc: Execute a Bash command string (COMMAND=...)
    summary: |
      Execute COMMAND with bash -c from the current working directory. Use run
      instead when executing a script file. Bash must be available in PATH.
    dir: "{{.USER_WORKING_DIR}}"
    preconditions:
      - sh: test -n "{{.COMMAND_OVERRIDE}}{{.COMMAND}}"
        msg: COMMAND is required. Pass COMMAND='echo hello' when running this task.
      - sh: command -v bash >/dev/null 2>&1
        msg: Bash is required. Install Bash and ensure it is available in PATH.
    env:
      BASH_EXEC_COMMAND: "{{if .COMMAND_OVERRIDE}}{{.COMMAND_OVERRIDE}}{{else}}{{.COMMAND}}{{end}}"
    cmds:
      - bash -c "$BASH_EXEC_COMMAND"

  version:
    run: once
    desc: Show the installed Bash version
    summary: Print the active Bash version via bash --version.
    preconditions:
      - sh: command -v bash >/dev/null 2>&1
        msg: Bash is required. Install Bash and ensure it is available in PATH.
    cmds:
      - bash --version
