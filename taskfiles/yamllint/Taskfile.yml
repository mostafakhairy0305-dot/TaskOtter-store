---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  uv:
    taskfile: ../uv/Taskfile.yml

vars:
  UV_LOAD: 'export PATH="$HOME/.local/bin:$PATH"'
  TARGETS: "."
  CONFIG: ""
  EXTRA_ARGS: ""
  YAMLLINT_VERSION: ""
  YAMLFIX_VERSION: ""

tasks:
  default:
    desc: Show available yamllint automation tasks
    summary: Display the list of available yamllint-related tasks defined in this Taskfile.
    cmds:
      - task --list

  install:
    run: once
    desc: Install yamllint on the current operating system
    summary: |
      Install yamllint via uv tool install for the current platform.
      Pass YAMLLINT_VERSION to pin a specific release instead of the latest.
      uv manages an isolated environment so yamllint never conflicts with
      project dependencies. Installs uv first if it is not already present.
    cmds:
      - task: _install:unix
      - task: _install:windows

  install:undo:
    desc: Remove yamllint from the current operating system
    summary: |
      Remove yamllint via uv tool uninstall on all platforms.
      The uv-managed isolated environment is cleaned up automatically.
    aliases:
      - uninstall
    prompt:
      - This will remove yamllint from this machine.
      - Continue?
    cmds:
      - task: _install:undo:unix
      - task: _install:undo:windows

  upgrade:
    desc: Upgrade yamllint to the latest release
    summary: |
      Upgrade yamllint via uv tool upgrade on all platforms.
      Auto-installs yamllint if missing.
    cmds:
      - task: _upgrade:unix
      - task: _upgrade:windows

  version:
    desc: Show the installed yamllint version
    summary: Print the active yamllint version via yamllint --version. Auto-installs yamllint if missing.
    deps:
      - install
    cmds:
      - bash -lc '{{.UV_LOAD}}; yamllint --version'

  lint:
    desc: Lint YAML files with yamllint (TARGETS=path)
    summary: |
      Run yamllint against TARGETS (default .). Pass CONFIG to use a custom
      config file via -c, and EXTRA_ARGS for additional flags.
      Auto-installs yamllint if missing.
    deps:
      - install
    vars:
      TARGETS: "."
      CONFIG: ""
      EXTRA_ARGS: ""
    cmds:
      - >-
        bash -lc '{{.UV_LOAD}};
        yamllint
        {{if .CONFIG_OVERRIDE}}-c "{{.CONFIG_OVERRIDE}}"
        {{else if .CONFIG}}-c "{{.CONFIG}}" {{end}}
        {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
        {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        && echo "✅ yamllint passed" || { echo "❌ yamllint failed"; exit 1; }'

  lint:fix:
    desc: Auto-fix YAML files with yamlfix (TARGETS=path)
    summary: |
      Run yamlfix against YAML files found under TARGETS (default .). Excludes
      Taskfile.yml files whose Go template syntax is incompatible with yamlfix.
      Pass EXTRA_ARGS for additional flags. Auto-installs yamlfix if missing.
    deps:
      - install
      - _install:yamlfix:unix
      - _install:yamlfix:windows
    vars:
      TARGETS: "."
      EXTRA_ARGS: ""
    cmds:
      - >-
        bash -lc '{{.UV_LOAD}};
        _t="{{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}";
        [ -d "$_t" ] || _t=".";
        find "$_t" \( -name "*.yml" -o -name "*.yaml" \)
        ! -name "Taskfile.yml" ! -name "Taskfile.yaml" -print0
        | xargs -0 yamlfix
        {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}'

  ci:
    desc: Lint YAML files in strict mode for CI (TARGETS=path)
    summary: |
      Run yamllint --strict against TARGETS. Exits non-zero on warnings as
      well as errors, making it suitable for continuous integration pipelines.
      Auto-installs yamllint if missing.
    deps:
      - install
    vars:
      TARGETS: "."
      CONFIG: ""
      EXTRA_ARGS: ""
    cmds:
      - >-
        bash -lc '{{.UV_LOAD}};
        yamllint --strict
        {{if .CONFIG_OVERRIDE}}-c "{{.CONFIG_OVERRIDE}}"
        {{else if .CONFIG}}-c "{{.CONFIG}}" {{end}}
        {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}{{else if .TARGETS}}{{.TARGETS}}{{else}}.{{end}}
        {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}
        && echo "✅ yamllint passed" || { echo "❌ yamllint failed"; exit 1; }'

  config:init:
    desc: Create a default .yamllint configuration file
    summary: |
      Write a sensible default .yamllint file in the current directory.
      Extends yamllint defaults with a relaxed line-length limit and explicit
      truthy values. Skipped if .yamllint already exists.
    status:
      - test -f .yamllint
    cmds:
      - "printf 'extends: default\\n' > .yamllint"
      - "printf 'rules:\\n' >> .yamllint"
      - "printf '  line-length:\\n' >> .yamllint"
      - "printf '    max: 120\\n' >> .yamllint"
      - "printf '  truthy:\\n' >> .yamllint"
      - "printf \"    allowed-values: ['true', 'false']\\n\" >> .yamllint"
      - echo 'Created .yamllint with default configuration.'

  _install:unix:
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '[ -z "{{.YAMLLINT_VERSION}}" ]'
      - bash -lc '{{.UV_LOAD}}; command -v yamllint >/dev/null 2>&1'
    deps:
      - uv:install
    cmds:
      - echo 'Installing yamllint via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"'
      - echo 'yamllint installed.'

  _install:yamlfix:unix:
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - '[ -z "{{.YAMLFIX_VERSION}}" ]'
      - bash -lc '{{.UV_LOAD}}; command -v yamlfix >/dev/null 2>&1'
    deps:
      - uv:install
    cmds:
      - echo 'Installing yamlfix via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "yamlfix{{if .YAMLFIX_VERSION}}=={{.YAMLFIX_VERSION}}{{end}}"'
      - echo 'yamlfix installed.'

  _install:yamlfix:windows:
    internal: true
    platforms: [windows]
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if ('{{.YAMLFIX_VERSION}}') { exit 1 } else { exit 0 }"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command yamlfix -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    deps:
      - uv:install
    cmds:
      - echo Installing yamlfix via uv...
      - uv tool install --force "yamlfix{{if .YAMLFIX_VERSION}}=={{.YAMLFIX_VERSION}}{{end}}"
      - echo yamlfix installed.

  _install:windows:
    internal: true
    platforms: [windows]
    status:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "if ('{{.YAMLLINT_VERSION}}') { exit 1 } else { exit 0 }"
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command yamllint -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
    deps:
      - uv:install
    cmds:
      - echo Installing yamllint via uv...
      - uv tool install --force "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"
      - echo yamllint installed.

  _install:undo:unix:
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    status:
      - bash -lc '{{.UV_LOAD}}; ! command -v yamllint >/dev/null 2>&1'
    cmds:
      - echo 'Removing yamllint...'
      - bash -lc '{{.UV_LOAD}}; uv tool uninstall yamllint'
      - echo 'yamllint removed.'

  _install:undo:windows:
    internal: true
    platforms: [windows]
    status:
      - >-
        powershell -NoProfile -ExecutionPolicy Bypass -Command
        "if (Get-Command yamllint -ErrorAction SilentlyContinue) { exit 1 } else { exit 0 }"
    cmds:
      - echo Removing yamllint via uv...
      - uv tool uninstall yamllint
      - echo yamllint removed.

  _upgrade:unix:
    internal: true
    platforms: [linux, darwin]
    set: [errexit, nounset, pipefail]
    preconditions:
      - sh: bash -lc '{{.UV_LOAD}}; command -v yamllint >/dev/null 2>&1'
        msg: yamllint is not installed. Run task install first.
    cmds:
      - echo 'Upgrading yamllint via uv...'
      - >-
        bash -lc '{{.UV_LOAD}}; uv tool install --force
        "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"'
      - echo 'yamllint upgraded.'

  _upgrade:windows:
    internal: true
    platforms: [windows]
    preconditions:
      - sh: >-
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "if (Get-Command yamllint -ErrorAction SilentlyContinue) { exit 0 } else { exit 1 }"
        msg: yamllint is not installed. Run task install first.
    cmds:
      - echo Upgrading yamllint via uv...
      - uv tool install --force "yamllint{{if .YAMLLINT_VERSION}}=={{.YAMLLINT_VERSION}}{{end}}"
      - echo yamllint upgraded.
