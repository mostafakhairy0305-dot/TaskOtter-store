---
version: "3"

output:
  group:
    begin: "::group::{{.TASK}}"
    end: "::endgroup::"
    error_only: false

silent: true

includes:
  pnpm:
    taskfile: ../pnpm-nvm/Taskfile.yml

vars:
  HTMLHINT_LINT_SKIP_PATTERN: ""
  TARGETS: "**/*.html"
  CONFIG: ""
  EXTRA_ARGS: ""
  VERSION: ""

tasks:
  default:
    run: once
    desc: Show available HTMLHint tasks
    cmds:
      - task --list

  install:
    run: once
    desc: Install HTMLHint as a local devDependency
    summary: |
      Install htmlhint as a local devDependency. Pass VERSION=x.y.z to pin a
      specific release instead of the package manager's default resolution.
    status:
      - >-
        node -e "const installed = require('./node_modules/htmlhint/package.json');
        const requested = '{{if .VERSION_OVERRIDE}}{{.VERSION_OVERRIDE}}{{else}}{{.VERSION}}{{end}}';
        process.exit(!requested || installed.version === requested ? 0 : 1)"
    cmds:
      - task: pnpm:add
        vars:
          PACKAGES: >-
            htmlhint{{if .VERSION_OVERRIDE}}@{{.VERSION_OVERRIDE}}
            {{- else if .VERSION}}@{{.VERSION}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}

  install:undo:
    run: once
    desc: Remove the locally installed HTMLHint devDependency
    summary: Remove htmlhint from local devDependencies via the active package manager.
    aliases:
      - uninstall
    prompt:
      - This will remove htmlhint from local devDependencies.
      - Continue?
    cmds:
      - task: pnpm:remove
        vars:
          PACKAGES: htmlhint
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  upgrade:
    run: once
    desc: Upgrade HTMLHint to the latest release
    summary: Reinstall htmlhint at the latest version as a local devDependency.
    cmds:
      - task: pnpm:add
        vars:
          PACKAGES: htmlhint@latest
          EXTRA_ARGS: "{{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}{{else}}{{.EXTRA_ARGS}}{{end}}"

  config:init:
    run: once
    desc: Create a default .htmlhintrc configuration file
    summary: |
      Write a .htmlhintrc file with HTMLHint's recommended default rules in
      the current directory. Skipped if .htmlhintrc already exists.
    dir: "{{.USER_WORKING_DIR}}"
    status:
      - test -f .htmlhintrc
    cmds:
      - 'printf ''{\n'' > .htmlhintrc'
      - 'printf ''  "tagname-lowercase": true,\n'' >> .htmlhintrc'
      - 'printf ''  "attr-lowercase": true,\n'' >> .htmlhintrc'
      - 'printf ''  "attr-value-double-quotes": true,\n'' >> .htmlhintrc'
      - 'printf ''  "doctype-first": true,\n'' >> .htmlhintrc'
      - 'printf ''  "tag-pair": true,\n'' >> .htmlhintrc'
      - 'printf ''  "spec-char-escape": true,\n'' >> .htmlhintrc'
      - 'printf ''  "id-unique": true,\n'' >> .htmlhintrc'
      - 'printf ''  "src-not-empty": true,\n'' >> .htmlhintrc'
      - 'printf ''  "attr-no-duplication": true,\n'' >> .htmlhintrc'
      - 'printf ''  "title-require": true\n'' >> .htmlhintrc'
      - 'printf ''}\n'' >> .htmlhintrc'
      - echo 'Created .htmlhintrc with default configuration.'

  lint:
    run: once
    desc: Lint HTML files with HTMLHint (TARGETS=glob)
    summary: |
      Run htmlhint against TARGETS (default **/*.html). Pass CONFIG to use a
      custom configuration file via --config, and EXTRA_ARGS for additional
      flags. Auto-installs HTMLHint if missing.
    dir: "{{.USER_WORKING_DIR}}"
    deps:
      - install
    cmds:
      - task: pnpm:exec
        vars:
          BINARY: htmlhint
          ARGS: >-
            {{if .CONFIG_OVERRIDE}}--config "{{.CONFIG_OVERRIDE}}"
            {{else}}{{if .CONFIG}}--config "{{.CONFIG}}" {{end}}{{end}}
            {{if .HTMLHINT_LINT_SKIP_PATTERN_OVERRIDE}}--ignore "{{.HTMLHINT_LINT_SKIP_PATTERN_OVERRIDE}}"
            {{else if .HTMLHINT_LINT_SKIP_PATTERN}}--ignore "{{.HTMLHINT_LINT_SKIP_PATTERN}}" {{end}}
            {{if .TARGETS_OVERRIDE}}{{.TARGETS_OVERRIDE}}
            {{else}}{{if .TARGETS}}{{.TARGETS}}{{else}}**/*.html{{end}}{{end}}
          EXTRA_ARGS: >-
            {{if .EXTRA_ARGS_OVERRIDE}}{{.EXTRA_ARGS_OVERRIDE}}
            {{- else}}{{.EXTRA_ARGS}}{{end}}{{if .CLI_ARGS}} {{.CLI_ARGS}}{{end}}
      - echo "✅ htmlhint passed"

  help:
    run: once
    desc: Show the HTMLHint CLI help
    deps:
      - install
    cmds:
      - task: pnpm:exec
        vars:
          BINARY: htmlhint
          ARGS: "--help"

  version:
    run: once
    desc: Show the locally resolved HTMLHint version
    deps:
      - install
    cmds:
      - task: pnpm:exec
        vars:
          BINARY: htmlhint
          ARGS: "--version"
